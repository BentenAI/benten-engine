# cargo-deny configuration for the Benten Engine workspace.
#
# Purpose: enforce supply-chain hygiene in CI. Fires on every PR via the
# cargo-deny GitHub Action. See `.github/workflows/supply-chain.yml` for the
# CI wiring and `CONTRIBUTING.md` "Supply chain" for the yank-response
# protocol.
#
# Authored: 2026-04-15 as Phase 1 deliverable T10 (see implementation plan
# R1 Triage Addendum, in response to security-auditor Critical #3).

[graph]
# Run on all workspace targets. This catches deps that only appear under
# specific feature flags or target architectures.
all-features = true
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "wasm32-unknown-unknown" },
]

[output]
feature-depth = 1

# ---------------------------------------------------------------------------
# Advisories — RUSTSEC advisories and yanked crate detection.
# ---------------------------------------------------------------------------

[advisories]
# Fail the build on any RUSTSEC advisory against the current dep tree.
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# `yanked = "deny"` is the setting that would have caught the core2 yank in
# real time, not after the spike ran and hit the registry error.
yanked = "deny"
ignore = [
    # Known accepted exceptions go here. Document each with a comment naming
    # the advisory ID, the impacted crate, the rationale, and a target date
    # for removing the ignore. If an entry lacks all four, the CI lint fails.
    #
    # Example format:
    # { id = "RUSTSEC-XXXX-YYYY", reason = "only reachable via `foo` crate's test-only path; upstream fix tracked at <URL>; remove by 2026-06-01" }

    # RUSTSEC-2026-0119: hickory-dns CPU exhaustion via O(n^2) name compression.
    # Reachable only via iroh's DNS resolver (Phase-3 P2P sync transport).
    # Transitive root: iroh 0.98.2 -> hickory-resolver 0.26.0-beta.4 -> hickory-proto.
    # Closure plan: Phase-3 R5 close iroh-version-bump cycle (Dependabot
    # fast-track per `scope-real-10`); Phase-7 Garden-relay work may
    # alternatively replace hickory-dns with a minimal in-process resolver.
    # Track at `docs/future/phase-3-backlog.md` §9 (security-advisory carries).
    # Remove when iroh upstream picks up a hickory-dns fix or when we drop
    # the dep edge.
    { id = "RUSTSEC-2026-0119", reason = "transitive via iroh -> hickory-resolver; closure tracked at docs/future/phase-3-backlog.md §9 (Phase-3 R5 close iroh-version-bump cycle / Phase-7 Garden-relay alt)" },

    # RUSTSEC-2026-0120: hickory-dns NSEC3 unbounded loop on cross-zone responses.
    # Same transitive root + same closure path as RUSTSEC-2026-0119.
    { id = "RUSTSEC-2026-0120", reason = "transitive via iroh -> hickory-resolver; closure tracked at docs/future/phase-3-backlog.md §9 (Phase-3 R5 close iroh-version-bump cycle / Phase-7 Garden-relay alt)" },

    # RUSTSEC-2024-0436: paste unmaintained advisory (informational; no exploit).
    # Transitive via netlink-packet-core -> netdev -> netwatch -> iroh.
    # Closure plan: same iroh bump cycle. Phase-3 R5 close eligible to land an
    # iroh patch that swaps `paste` for `pastey` (drop-in fork). Tracked at
    # `docs/future/phase-3-backlog.md` §9 (security-advisory carries).
    { id = "RUSTSEC-2024-0436", reason = "transitive via iroh -> netwatch -> netlink-packet-core -> paste; informational unmaintained advisory; closure tracked at docs/future/phase-3-backlog.md §9 (iroh-version-bump cycle / pastey swap)" },
]

# ---------------------------------------------------------------------------
# Licenses — allowlist. Anything not in this list fails the build.
# ---------------------------------------------------------------------------

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    # Phase-3 transitive-dep additions (deny.toml ratified pre-R4b 2026-05-08).
    # All four are compatible with the Benten Engine's MIT/Apache-2.0 dual
    # licensing posture: the engine itself stays MIT/Apache-2.0-dual; transitive
    # binary deps under these licenses do not impose copyleft on Benten source.
    #
    # MPL-2.0 (Mozilla Public License 2.0) — weak/file-level copyleft. OSI-approved,
    # FSF Free/Libre. Compatible with MIT/Apache-2.0 because MPL's reciprocity is
    # at the FILE level only — modifications to MPL-licensed FILES must stay MPL,
    # but linking from MIT/Apache-2.0-licensed code is unrestricted.
    # Transitive roots: bitmaps + im + sized-chunks (loro CRDT data-structures
    # stack via `loro-internal`).
    "MPL-2.0",
    # Unlicense — public-domain-equivalent dedication. OSI-approved, FSF
    # Free/Libre. Strictly more permissive than MIT.
    # Transitive roots: pharos + ws_stream_wasm + async_io_stream (iroh-relay
    # WebSocket transport stack).
    "Unlicense",
    # CDLA-Permissive-2.0 (Community Data License Agreement, Permissive 2.0).
    # Linux-Foundation-stewarded permissive data license — used by Mozilla's
    # webpki-roots crates to publish the bundled root-CA list. Permissive at
    # the data level (no reciprocity); compatible with MIT/Apache-2.0 binary
    # distribution.
    # Transitive roots: webpki-roots + webpki-root-certs (rustls TLS stack).
    "CDLA-Permissive-2.0",
    # BSL-1.0 (Boost Software License 1.0). OSI-approved, FSF Free/Libre.
    # Strictly more permissive than MIT (no notice-preservation requirement on
    # binary redistribution).
    # Transitive root: xxhash-rust (loro-internal hash-mix).
    "BSL-1.0",
]
# Everything else — proprietary, copyleft (GPL, AGPL, LGPL), or unlicensed — is
# denied by omission. This prevents a transitive dep from silently forcing a
# license change on the whole engine.
confidence-threshold = 0.9
exceptions = [
    # Rare SPDX-unfriendly crates with manual vetting. Each needs a comment
    # naming the crate version audited, the license text reviewed, and the
    # person who reviewed. Empty by default.
]

# ---------------------------------------------------------------------------
# Bans — crates explicitly forbidden, duplicate-dep detection.
# ---------------------------------------------------------------------------

[bans]
multiple-versions = "warn"
# Workspace path-dependencies (`benten-foo = { path = "../benten-foo" }`)
# are treated as wildcard dependencies by cargo-deny. The `allow-wildcard-paths`
# escape hatch only fires for crates marked `publish = false`; benten-engine
# crates are not yet `publish = false` (publication is deferred to Phase 8/9+
# per CLAUDE.md, and the publish-readiness pass at Phase-2a §3.2 was deferred
# accordingly).
#
# Until the Phase 8/9+ publish-readiness pass, downgrade wildcards from
# "deny" to "warn" so cargo-deny still emits the diagnostic but doesn't fail
# CI. The Phase 8/9+ pass will: (a) flip every internal crate to
# `publish = false` (or set explicit version-aligned path+version deps for
# the ones we ARE publishing), and (b) re-enable `wildcards = "deny"` here.
# Tracked at `.addl/phase-2a/00-implementation-plan.md` §3.2 (publish-readiness
# pass deferred to Phase 8/9+; CLAUDE.md status table records the deferral).
wildcards = "warn"
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

deny = [
    # The archived core2 crate — present only via our BentenAI/rust-cid fork
    # and the technocreatives/core2 git patch as a transitional measure.
    # cargo-deny will not complain about the patched source because the
    # source is identified by git URL, not by crates.io name. If core2 ever
    # reappears from crates.io (e.g., someone else publishes 0.4.1 under the
    # same name), the yank-resolved advisory will be re-checked; but any
    # direct crates.io pull of core2 is a supply-chain regression.
    { name = "openssl", reason = "use rustls — no OpenSSL dep surface" },
    { name = "openssl-sys", reason = "use rustls — no OpenSSL dep surface" },
]

# Skip duplicate-version complaints for crates where multiple versions are
# known-acceptable in the current ecosystem state. Each entry must name the
# reason and be reviewed at each quarterly dep update.
skip = []
skip-tree = []

# ---------------------------------------------------------------------------
# Sources — where cargo is allowed to pull from.
# ---------------------------------------------------------------------------

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Git sources allowed by URL. Every entry is a transitional workaround
# documented in Cargo.toml's [patch.crates-io] section.
allow-git = [
    "https://github.com/BentenAI/rust-cid",
    "https://github.com/technocreatives/core2",
]

[sources.allow-org]
# No GitHub org-level blanket allows. Every git URL must be individually
# listed in `allow-git` above so a new fork isn't silently admitted.
github = []
