[package]
name = "benten-dev"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Benten dev-server (Phase-2a G11-A): hot-reload of handler subgraphs, cap-grant preservation across reload, inspect-state pretty-printer for suspended ExecutionStateEnvelopes."
publish = false

[lints]
workspace = true

[lib]
path = "src/lib.rs"
bench = false

[[bin]]
name = "benten-dev"
path = "src/main.rs"

[dependencies]
benten-core = { path = "../../crates/benten-core" }
benten-errors = { workspace = true }
benten-eval = { path = "../../crates/benten-eval" }
blake3 = { workspace = true, features = ["pure"] }

[dev-dependencies]
tempfile = { workspace = true }
