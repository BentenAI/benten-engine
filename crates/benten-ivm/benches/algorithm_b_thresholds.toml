# Algorithm B vs hand-written bench-gate thresholds (G8-A).
#
# ## Hybrid gate (cr-g8a-mr-4 fix-pass)
#
# An earlier draft used a uniform ratio gate (B/A ≤ 1.20) per the original
# plan §3 G8-A wording. The mini-review (cr-g8a-mr-4) flagged this as
# wrong-shape: 4 of 5 hand-written views run at ~500-800 ns / event so a
# single `Box<dyn View>` virtual call (~5-10 ns) is already a 1.5-2x ratio
# floor — the 1.20x ceiling cannot be made true except by collapsing the
# wrapper abstraction.
#
# The hybrid gate measures what we actually care about per view:
#
# - **Lightweight views** (A baseline ≤ 1 µs total bench-iter time): assert
#   absolute overhead `(B_mean - A_mean) ≤ max_overhead_ns`. The bench
#   measures total iteration time (one view construction + N=256 updates).
#   With a pure-delegation wrapper at ~0.5-1 ns per event the total
#   overhead lands at ~150-250 ns; the 350 ns ceiling adds ~30% headroom
#   for run-to-run noise without admitting pathological growth.
# - **Heavyweight views** (A baseline > 1 µs total bench-iter time): assert
#   ratio `B_mean / A_mean ≤ max_ratio`. At >1 µs total iteration time the
#   wrapper's per-event dispatch overhead is <1% so a ratio gate is the
#   meaningful framing.
#
# Both metrics compare the Criterion mean (`mean.point_estimate` ns) for
# strategy=A vs strategy=B for the named bench-id (which is the per-view
# `BenchmarkGroup` on disk).
#
# Per-view classification + threshold lives in `[per_view]` below. The
# `kind` column dispatches the gate test to the matching assertion.
#
# These thresholds are READ by `tests/algorithm_b_within_20pct_gate.rs`
# after a Criterion run produces `target/criterion/.../estimates.json`.
# Per Phase-2a convention numeric thresholds live in `.toml` config so they
# can be tightened independently of the bench source.

[gate]
# Sentinel value referenced by the test as the "off" / "no per-view override"
# default. NOT used as a uniform ceiling — the hybrid per-view rows are
# authoritative. Kept for the [gate] section header presence assertion the
# placeholder loader carried.
description = "hybrid: absolute-overhead-ns for lightweight views; ratio for heavyweight views"

[per_view]
# Order mirrors `r1-ivm-algorithm.json` perf-risk descending — first row
# is the hardest gate to pass.
# View-id naming follows the bench group's BenchmarkId path on disk
# (event_handler_dispatch is the bench id; the view internally reports
# `event_dispatch` — the bench-disk path takes precedence here).

# content_listing — heavyweight (~10 µs baseline at 256 events). Ratio gate.
[per_view.content_listing]
kind = "ratio"
max_ratio = 1.50

# governance_inheritance — recovery-agent measured ~3.64x ratio against
# ~500 ns A baseline. Lightweight; absolute-overhead gate.
[per_view.governance_inheritance]
kind = "absolute_overhead_ns"
max_overhead_ns = 350.0

# version_current — lightweight; absolute-overhead gate.
[per_view.version_current]
kind = "absolute_overhead_ns"
max_overhead_ns = 350.0

# capability_grants — lightweight; absolute-overhead gate.
[per_view.capability_grants]
kind = "absolute_overhead_ns"
max_overhead_ns = 350.0

# event_handler_dispatch — lightweight; absolute-overhead gate. Note the
# bench-disk path is `event_handler_dispatch` (not the view-id-internal
# `event_dispatch`) — the bench group name is canonical for path lookup.
[per_view.event_handler_dispatch]
kind = "absolute_overhead_ns"
max_overhead_ns = 350.0
