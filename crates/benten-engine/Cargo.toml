[package]
name = "benten-engine"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Orchestrator crate composing the Benten graph engine public API."

[lints]
workspace = true

[lib]
# Disable the implicit libtest bench harness so `cargo bench --workspace`
# passes Criterion CLI flags through without libtest rejecting them. See
# benten-core/Cargo.toml for the longer rationale.
bench = false

[features]
# Expose test-only helper methods on Engine (e.g.
# `test_subscribe_all_change_events`, `testing_insert_privileged_fixture`).
# The helpers are also available unconditionally under `cfg(test)`; this
# feature lights them up for integration tests under tests/ (which are
# compiled against the non-test library). See code-reviewer finding
# g7-cr-4.
#
# G11-A Wave 2a (CFG-GATING): `default = []` so release builds
# (`cargo check -p benten-engine --no-default-features`) do NOT
# compile the test-only surfaces listed under `test-helpers` — most
# importantly `engine_wait::testing_force_reregister_with_different_cid`
# and the `engine_wait::ENVELOPE_CACHE` + `cache_put` / `cache_get`
# helpers. CI workflows (`ci.yml`, `msrv.yml`, `phase-2a-exit-criteria.yml`,
# `cross-process-graph.yml`, `host-error-wire-safety.yml`) pass
# `--features benten-engine/test-helpers` alongside
# `--features benten-eval/testing` so the `cargo test` / `cargo nextest
# run` invocations continue to light the helpers up.
default = []
# R6 fix-pass A2: narrow feature that gates ONLY the
# `engine_wait::ENVELOPE_CACHE` static + `cache_put`/`cache_get` helpers.
# The napi cdylib needs the WAIT suspend/resume bridge live but does NOT
# need the broader `test-helpers` surface
# (`testing_force_reregister_with_different_cid`, `testing_audit_sequence`,
# `testing_insert_privileged_fixture`, etc.). Splitting lets
# `bindings/napi/Cargo.toml` opt into the cache without dragging the
# rest of the test-only API into the cdylib. `test-helpers` implies this
# feature so existing CI invocations + workspace test runs keep working
# unchanged.
envelope-cache-test-grade = []
# G12-A: narrow feature that gates ONLY the
# `Engine::testing_set_iteration_budget` setter (consumed by the napi
# `bindings/napi/test/budget_exhausted_napi_round_trip.test.ts`
# integration test that exercises the runtime BudgetExhausted emission
# path through the JS surface). Splitting it off the broader
# `test-helpers` lets `bindings/napi/Cargo.toml` opt into the budget
# override without dragging the rest of the test-only API into the
# cdylib. `test-helpers` implies this feature so existing CI invocations
# keep working unchanged. Production cdylib consumers do NOT see this
# method unless they explicitly opt in.
iteration-budget-test-grade = []
test-helpers = ["envelope-cache-test-grade", "iteration-budget-test-grade"]
# `phase_2b_landed` — see benten-eval/Cargo.toml for the rationale. Gates
# Phase-2b R3 red-phase test files that import R5-pending surfaces from
# benten-engine (e.g. `engine.callStream`, `engine.installModule`,
# `benten_engine::testing::testing_*`).
phase_2b_landed = []
# Phase-2a R3's original `phase_2a_stubs` feature was removed at R4
# fix-pass (cov-1) — the R3 consolidation stubs made the gate obsolete
# for the 4 exit-gate composite files (wait_resume_determinism,
# inv_8_11_13_14_firing, arch_1_dep_break_verified, option_c_end_to_end).
# Those tests now compile and fail at `todo!()` panics carrying the
# owning R5 group pointer.
#
# `phase_2a_pending_apis` gates the WAIT-stack-inspection / closure-style
# DSL / `call_with_ticking_mono_clock` / `testing_reput_subgraph_as_user`
# test files (currently 8 across `tests/` + `tests/integration/`) whose
# bodies reach into APIs wider than the R3 consolidation stubs. R5 G2-B /
# G3-B / G9-A landed their respective APIs but the gate stayed because
# downstream R6 work that completes the WAIT-related test bodies is still
# pending.
#
# G12-C-cont (Phase 2b R6 A1 closure) addressed the original
# `SubgraphBuilder` arm of this gate by completing the type relocation
# from `benten-eval` to `benten-core` (see `crates/benten-core/src/
# subgraph.rs`). The WAIT / closure-DSL arms remain — so the feature
# stays. The next Phase-2b R6 wave can audit per-file and lapse the
# gate as the WAIT bodies fill in.
phase_2a_pending_apis = []

[dependencies]
benten-caps = { path = "../benten-caps" }
benten-core = { path = "../benten-core" }
benten-errors = { workspace = true }
benten-eval = { path = "../benten-eval", features = ["diag"] }
benten-graph = { path = "../benten-graph" }
benten-ivm = { path = "../benten-ivm" }
blake3 = { workspace = true }
thiserror = { workspace = true }
# Phase 2b G10-B — `ModuleManifest` canonical DAG-CBOR encoding (D9-RESOLVED).
# Production code paths (`Engine::install_module`, `Engine::compute_manifest_cid`)
# serialize manifests via serde_ipld_dagcbor, so these graduate from
# dev-deps to regular deps.
serde = { workspace = true, features = ["std"] }
serde_ipld_dagcbor = { workspace = true }

# Phase 2b G7-A — `engine.toml` workspace-config parser. Reads at
# `Engine::open` time; failed parsing surfaces as `E_ENGINE_CONFIG_INVALID`.
# Per Ben's G7-A brief addition: deployment-level override of D24
# wallclock defaults (and future engine knobs). serde + serde derive
# wired through here for the EngineConfig schema; toml drives the
# workspace-root parse.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
toml = { workspace = true }
serde = { workspace = true }
# wsa-g7a-mr-4 fix-pass: emit a startup-warning when engine.toml relaxes
# the D24 built-in wallclock ceiling.
tracing = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
tempfile = { workspace = true }
# Phase 2a R3 tests: proptest + serde + serde_ipld_dagcbor reach into the
# DAG-CBOR schema directly for tamper-injection paths (notably
# `resume_with_missing_attribution_triple_rejects` derives `Serialize`
# on a parallel "tampered" envelope shape).
proptest = { workspace = true }
serde = { workspace = true }
serde_ipld_dagcbor = { workspace = true }

