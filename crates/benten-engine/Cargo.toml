[package]
name = "benten-engine"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Orchestrator crate composing the Benten graph engine public API."

[lints]
workspace = true

[features]
# Expose test-only helper methods on Engine (e.g.
# `test_subscribe_all_change_events`, `testing_insert_privileged_fixture`).
# The helpers are also available unconditionally under `cfg(test)`; this
# feature lights them up for integration tests under tests/ (which are
# compiled against the non-test library). See code-reviewer finding
# g7-cr-4. Enabled by default so `cargo test` works without --features;
# publishers of release artifacts disable via `--no-default-features`.
default = ["test-helpers"]
test-helpers = []

[dependencies]
benten-caps = { path = "../benten-caps" }
benten-core = { path = "../benten-core" }
benten-eval = { path = "../benten-eval", features = ["diag"] }
benten-graph = { path = "../benten-graph" }
benten-ivm = { path = "../benten-ivm" }
blake3 = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
tempfile = { workspace = true }

[[bench]]
name = "roundtrip"
harness = false

[[bench]]
name = "end_to_end_create"
harness = false
