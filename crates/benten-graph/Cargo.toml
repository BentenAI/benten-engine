[package]
name = "benten-graph"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Storage abstraction (KVBackend trait) and redb implementation for the Benten graph engine."

[lints]
workspace = true

[dependencies]
benten-core = { path = "../benten-core" }
redb = { workspace = true }
serde_ipld_dagcbor = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
proptest = { workspace = true }
criterion = { workspace = true }
# Cross-process graph integration test (`d2_cross_process_graph.rs`) opens
# the engine to round-trip a persisted node. Dev-dep cycle is safe.
benten-engine = { path = "../benten-engine" }

[[bin]]
# Test-fixture binary used by d2_cross_process_graph.rs to prove PID
# separation. Writes the canonical fixture node to the path given in
# argv[1] then exits. Kept lean so the spawn cost on `cargo test` is
# tolerable. CARGO_BIN_EXE_write-canonical-and-exit is resolved by the
# test via the `env!()` macro.
name = "write-canonical-and-exit"
path = "bin/write_canonical_and_exit.rs"
# Required-features guard keeps the binary out of `cargo build` when
# benten-graph is consumed as a library dep.
test = false
bench = false

[[bench]]
name = "get_create_node"
harness = false

[[bench]]
name = "durability_modes"
harness = false

[[bench]]
name = "concurrent_writers"
harness = false

[[bench]]
name = "multi_mb_roundtrip"
harness = false
