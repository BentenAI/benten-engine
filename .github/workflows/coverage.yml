name: Coverage

# R6-TA-5: cargo-llvm-cov workflow — backs the hand-counted R4 coverage
# metrics (108/113 public APIs, 21/21 error codes, etc.) with measured
# line / region coverage so a PR that drops coverage trips a visible
# signal rather than relying on reviewer discipline alone.
#
# Phase-1 policy:
#   - Runs on PRs to main AND on main pushes, so every merge updates
#     the tracked coverage number.
#   - Emits an HTML report as a CI artifact (downloadable from the
#     workflow run page) plus a plain-text summary in the job output so
#     reviewers can see "coverage went from N% to M%" without digging
#     into the artifact.
#   - Does NOT fail on coverage drops at Phase 1 — the baseline is
#     being measured for the first time and gating prematurely would
#     turn every red-phase TDD PR into a coverage-policy argument.
#     Phase-2 adds a threshold gate once the baseline is stable.
#   - codecov / coveralls integration is deliberately NOT wired —
#     both need a token + account setup that isn't in place for
#     Phase-1. The artifact + job-output summary are sufficient to
#     drive human review.
#
# Triggers: PR + main push (opt-in via workflow_dispatch for ad-hoc).
#
# Runner: ubuntu-latest — llvm-cov is platform-portable and the coverage
# signal does not depend on arch, so one leg is enough.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  coverage:
    name: cargo-llvm-cov
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust toolchain (with llvm-tools)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: coverage

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage report (HTML + summary + lcov)
        # `--workspace` walks every member crate; the HTML artifact is
        # navigable from the workflow run page for deep dives. The
        # `--summary-only` second invocation pipes a one-liner into the
        # job output so reviewers don't have to download the artifact
        # for a top-level number. The `--lcov` emission feeds codecov.io.
        #
        # `--features benten-eval/testing,benten-engine/test-helpers,benten-graph/testing`
        # mirrors ci.yml's build+test invocation. Without these the
        # workspace test compile fails on `benten_eval::register_test_callee`
        # (gated under `cfg(any(test, feature = "testing"))`) +
        # `Engine::backend_for_test` etc., because llvm-cov drives a
        # standalone `cargo test --tests` build that does not see the
        # testing-feature flags ci.yml passes through.
        run: |
          cargo llvm-cov --workspace --html --output-dir coverage-report \
            --features benten-eval/testing,benten-engine/test-helpers,benten-graph/testing
          cargo llvm-cov report --lcov --output-path coverage.lcov
          echo "### Coverage summary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov report --summary-only >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-${{ github.run_id }}
          path: coverage-report/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload lcov to codecov.io
        # Token-less upload — the action auto-discovers the public-repo
        # identity from the github context. Public-repo OSS gets PR diff
        # comments + historical trend charts from codecov for free. Wire-
        # up decision recorded in .addl/phase-2a/ci-decisions-2026-04-22.md
        # §4 open-question #2.
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: coverage.lcov
          fail_ci_if_error: false
          verbose: true
