name: WASM Runtime (wasm32-wasip1 + wasmtime)

# Phase 2b R4-FP B-3 (red-phase) STUB. Pin source: plan §3.1 Phase-2b CI
# additions + r4-qa-expert.json qa-r4-09 (3 of 5 expected workflow YAMLs
# missing). This is the wasm32-wasip1 RUNTIME workflow (separate from
# `wasm-conformance.yml` which exercises the ESC-1..16 fixture suite, and
# separate from `wasm-browser.yml` which targets wasm32-unknown-unknown).
# This workflow exercises the wasmtime runtime against the canonical
# benten-eval surface (build + smoke-run, NOT exhaustive escape-attempt
# coverage -- that's wasm-conformance.yml's job).
#
# Trigger discipline per METH-13: pull_request branches: [main] +
# push branches: [main]. workflow_dispatch added for ad-hoc reruns.
# No `push: branches: ['**']`.
#
# Status (per ci-decisions-2026-04-22.md §4): INFORMATIONAL ONLY -- not
# a member of the 5-required-check set (`ci.yml`, `determinism.yml`,
# `phase-2a-exit-criteria.yml`, `drift-detect.yml`, `supply-chain.yml`).
# The required-check fleet stays narrow per METH-8 concurrency budget.
#
# This is a SCAFFOLD. R5 implementation (G7-B + G10-A-wasip1) fills in
# the actual job steps:
#   - install Rust + wasm32-wasip1 target
#   - install wasmtime
#   - cargo build --target wasm32-wasip1 -p benten-eval --features phase_2b_landed
#   - run benten-eval test binaries under wasmtime
#   - assert canonical fixture CID matches native build (wasm-r1-1 dual-target)
#
# Owned by R4-FP B-3 (R3-followup); R5 owners G7-B + G10-A-wasip1.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: wasm-runtime-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  wasm-runtime-stub:
    name: wasm32-wasip1 + wasmtime smoke — RED-PHASE STUB
    runs-on: ubuntu-24.04
    timeout-minutes: 20
