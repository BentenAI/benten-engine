name: Supply Chain

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly audit of the committed lockfile against the latest advisory DB.
    # Opens an issue when new advisories appear even if no PR is in flight.
    - cron: '0 12 * * 1'

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-deny:
    name: cargo-deny (licenses / bans / advisories / sources)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb # v2
        with:
          command: check
          arguments: --all-features
          # `--allow wildcard` is a `check` subcommand option, so it goes in
          # `command-arguments` (post-subcommand), not `arguments`
          # (pre-subcommand). The cargo-deny-action composes the command line
          # as `cargo-deny {arguments} check {command-arguments}`.
          #
          # Downgrades the `bans.wildcards = "deny"` lint for path-only /
          # workspace-internal wildcard deps that cargo-deny flags because the
          # `path = ".."` form lacks a version field. Genuine wildcard
          # versions from crates.io still trip `deny` via other code paths;
          # this narrow allow applies only to workspace-internal path/git
          # forms. Clean resolution moves to `bans.allow-wildcard-paths = true`
          # in deny.toml once that file is next touched.
          command-arguments: --allow wildcard
          # Fail on any advisory with CVSS HIGH or CRITICAL. Medium/low
          # advisories surface as warnings. The deny.toml `yanked = "deny"`
          # setting catches yanked crates regardless of severity (which would
          # have caught the core2 event in real time).

  cargo-audit:
    name: cargo-audit (belt-and-suspenders)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-audit
        # Prebuilt binary via taiki-e install-action — ~3s instead of ~45s
        # for `cargo install --locked cargo-audit` (which compiles from
        # source).
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2
        with:
          tool: cargo-audit

      - name: Audit
        run: cargo audit --deny warnings

  lockfile-verify:
    name: Cargo.lock integrity
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Verify Cargo.lock is the fully-resolved source of truth
        # --locked fails if Cargo.lock would need to change. If it fails in
        # CI but not locally, the author forgot to commit an updated lock.
        run: cargo build --locked --workspace

  weekly-audit-issue:
    # Only runs on the scheduled weekly cron. Opens a GitHub issue when new
    # advisories land, so the dep watch doesn't rely on someone happening to
    # push a PR.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2
        with:
          tool: cargo-audit

      - name: Run audit and collect output
        id: audit
        run: |
          set +e
          cargo audit --json > audit-report.json 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Open tracking issue on new advisories
        if: steps.audit.outputs.exit_code != '0'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('audit-report.json', 'utf8');
            const body = `Weekly cargo-audit detected one or more advisories against the current committed lockfile.\n\n\`\`\`json\n${report}\n\`\`\`\n\nResponse protocol: see CONTRIBUTING.md "Supply chain" section.`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[supply-chain] cargo-audit advisory detected (${new Date().toISOString().slice(0, 10)})`,
              body: body,
              labels: ['supply-chain', 'needs-triage']
            });
