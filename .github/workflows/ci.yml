name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Format, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo nextest run --workspace

      - name: Doc build
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      # Error-catalog drift detector (T7). The detector script lives at
      # `scripts/drift-detect-error-catalog.mjs` (R3 deliverable). A
      # dedicated workflow (`.github/workflows/drift-detect.yml`, owned by
      # rust-test-writer-security) invokes this same script on a wider
      # trigger matrix; keeping an inline call here means a broken
      # catalog surfaces on the main CI summary, not just in a peripheral
      # workflow.
      - name: Setup Node.js for drift detector
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Error-catalog drift detector
        run: node scripts/drift-detect-error-catalog.mjs
