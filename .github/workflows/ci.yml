name: CI

# Main Phase 1 CI workflow (T4/T5/T6/T9 + scaffolder cold-install).
#
# Jobs:
#   1. build-and-test   â€” multi-arch matrix (macOS arm64/x86_64, Linux
#                         x86_64/arm64) x (MSRV 1.85, stable).
#                         Runs fmt, clippy, nextest, doc. Emits canonical
#                         CID for the cross-leg gate.
#   2. wasm-runtime     â€” wasm32-wasip1 under wasmtime (canonical CID
#                         reproduction) + wasm32-unknown-unknown compile
#                         check for bindings/napi.
#   3. cross-leg-gate   â€” asserts every leg's CID is byte-identical.
#   4. cold-install     â€” `npx create-benten-app test-project &&
#                         cd test-project && npm install && npm run test`.
#
# T7 (error-catalog drift) and T10 (supply-chain) are NOT in this workflow:
# they have dedicated standalone workflows (`drift-detect.yml`,
# `supply-chain.yml`) that trigger on push + PR with their own concurrency
# groups, matching coverage, and the correct flag set. The previous inline
# copies here diverged from the standalones (different `cargo deny` flags;
# `drift-detect.yml` did not have the regen-freshness check) and were
# silently-red for multiple commits behind this workflow's concurrency-
# cancel storm. The ci-forensics-2026-04-22 audit grouped this under
# "duplicated-checks-with-diverging-semantics produce false greens" â€”
# single-owner-per-gate is the remediation.
#
# Companion workflows (determinism.yml, wasm-checks.yml, supply-chain.yml,
# drift-detect.yml, cold-install.yml) run the same checks on wider trigger
# matrices (weekly cron, release events, seeded-vuln canaries). The set of
# jobs here is the PR-gate subset specific to functional build+test that is
# not covered by a standalone; every one of these must be green for a PR
# to merge, but the drift + supply-chain gates live in their own files.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # --------------------------------------------------------------------------
  # T4 (multi-arch) + T5 (MSRV) â€” one matrix leg per (os, rust) pair.
  # --------------------------------------------------------------------------
  build-and-test:
    name: build+test ${{ matrix.leg }} @ ${{ matrix.rust }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,         leg: macos-arm64,   target: aarch64-apple-darwin,       rust: "1.85.0" }
          - { os: macos-14,         leg: macos-arm64,   target: aarch64-apple-darwin,       rust: stable   }
          - { os: macos-15-intel,   leg: macos-x86_64,  target: x86_64-apple-darwin,        rust: "1.85.0" }
          - { os: macos-15-intel,   leg: macos-x86_64,  target: x86_64-apple-darwin,        rust: stable   }
          - { os: ubuntu-24.04,     leg: linux-x86_64,  target: x86_64-unknown-linux-gnu,   rust: "1.85.0" }
          - { os: ubuntu-24.04,     leg: linux-x86_64,  target: x86_64-unknown-linux-gnu,   rust: stable   }
          - { os: ubuntu-24.04-arm, leg: linux-arm64,   target: aarch64-unknown-linux-gnu,  rust: "1.85.0" }
          - { os: ubuntu-24.04-arm, leg: linux-arm64,   target: aarch64-unknown-linux-gnu,  rust: stable   }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.leg }}-${{ matrix.rust }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: cargo fmt --check
        # fmt + clippy only on stable to avoid MSRV-chasing lint churn; the
        # MSRV legs still build+test to catch accidental post-1.85 features.
        if: matrix.rust == 'stable'
        run: cargo fmt --all -- --check

      - name: cargo clippy
        if: matrix.rust == 'stable'
        run: cargo clippy --workspace --all-targets --features benten-eval/testing,benten-engine/test-helpers,benten-graph/testing -- -D warnings

      - name: cargo build --locked
        # `--features benten-eval/testing` unlocks the `register_test_callee`
        # MUTATION surface + MockMonotonicSource re-export for benten-eval's
        # own integration tests (G4-A mini-review C1). Without it,
        # `cargo build --all-targets` fails on test + bench code referencing
        # `benten_eval::MockMonotonicSource` / `MockTimeSource::frozen_at_epoch`.
        #
        # G11-A Wave 2a (CFG-GATING): `--features benten-engine/test-helpers`
        # lights the test-only `backend_for_test` / `engine_wait.cache_put` /
        # `testing_force_reregister_with_different_cid` + the bloom and
        # immutability test hooks on `RedbBackend` back on. The `test-helpers`
        # default was flipped off so release builds
        # (`cargo check -p benten-engine --no-default-features`) do not
        # compile those surfaces; CI re-enables them here so the full
        # `cargo build --all-targets` / `cargo nextest run` continues to
        # pick up every integration test.
        run: cargo build --workspace --all-targets --locked --features benten-eval/testing,benten-engine/test-helpers,benten-graph/testing

      - name: cargo nextest run
        env:
          # R6-TA-3: the `PROPTEST_CASES` env var was designed in at R3 but
          # never set in CI â€” every PR was running the proptest default of
          # 256 cases. 1024 on PR gives a meaningfully-stronger signal
          # without blowing PR wall-clock; the nightly `fuzz.yml` workflow
          # owns the 10 000-case heavy runs.
          PROPTEST_CASES: "1024"
          PROPTEST_MAX_SHRINK_ITERS: "4096"
        # R6b-TA-2: explicitly select `--profile ci` so `.config/nextest.toml`
        # `[profile.ci]` (retries=0, fail-fast=false, immediate-final output,
        # 60s slow-timeout Ă— 3 terminate) actually takes effect. Previously
        # the profile was defined but never activated, so CI silently ran
        # under `[profile.default]` (status-level=pass was noisy, and
        # fail-fast defaulted to true â€” masking cross-leg regressions).
        # `--features benten-eval/testing` activates the `register_test_callee`
        # MUTATION surface for benten-eval's own integration tests (G4-A
        # mini-review C1). The feature is off by default so release /
        # non-test builds cannot seed the TEST_CALLEE_REGISTRY that
        # production Inv-8 budget decisions consult.
        # Filter expression excludes the known Phase-2a-R5 red-phase
        # tests enumerated at r5-decisions-log.md D12.6 ("fail count
        # remaining after G5-B-i fix-pass, all resolved by G11-A"). Each
        # exclusion points at a specific waiting-on-impl or waiting-on-
        # wave-2 item in plan Â§G11-A; the exclusions drop as those items
        # land. Categories:
        #   - load_verified/load_subgraph_verified â€” RESOLVED in G11-A
        #     Wave 3a STORAGE-VERIFIED (benten-core::Subgraph::
        #     load_verified_with_cid + RedbBackend::load_subgraph_verified).
        #   - ast_cache_* / old_subgraph_cid_not_reachable â€” RESOLVED in
        #     G11-A Wave 3a RESIDUALS (tests rewritten via
        #     testing_force_reregister_with_different_cid hook so the
        #     Phase-1 DuplicateHandler contract is preserved).
        #   - prop_parent_single_wildcard_is_still_narrowing â€” RESOLVED
        #     in G11-A Wave 3a RESIDUALS. Mis-filed as "flaky" in D12.6:
        #     panicked deterministically on `GrantScope::parse("*")`
        #     under ucca-7's ScopeLoneStarRejected. Rewritten to pin the
        #     post-ucca-7 contract.
        #   - variant_count_is_pinned â€” RESOLVED in G11-A Wave 3a
        #     RESIDUALS. Mis-classified here as TraceStep shape-pin; was
        #     actually a benten-errors catalog drift (42 vs 58).
        #     ALL_CATALOG_VARIANTS expanded to include 5 reserved
        #     HostError + 10 Phase-2a firing + CapScopeLoneStarRejected.
        #   - view_stale_count_tallies â€” RESOLVED in G11-A Wave 3a
        #     RESIDUALS. IVM-side tally was already correct; test needed
        #     `.with_test_ivm_budget(4)` so a modest write burst actually
        #     trips the view past its freshness bound.
        #   - compromise_6_* / compromise_7_* â€” RESOLVED in G11-A Wave
        #     3a DOC-REGRESSION. Compromise #7: `crates/benten-graph/
        #     Cargo.toml` carries `required-features = ["test-fixtures"]`
        #     on the bin + `default = ["test-fixtures"]`; the prior
        #     Wave-1 MODERATE-3 `testing` piggy-back in `default` was
        #     relocated to the explicit `--features benten-graph/testing`
        #     CI flag below. Compromise #6: `docs/SECURITY-POSTURE.md`
        #     re-tracked so CI fresh clones see the BLAKE3 /
        #     128-bit collision-resistance section.
        # All filter clauses dropped â€” Wave 3a closed every remaining
        # red-phase carry.
        run: |
          cargo nextest run --profile ci --workspace --locked --features benten-eval/testing,benten-engine/test-helpers,benten-graph/testing

      - name: cargo doc
        if: matrix.rust == 'stable'
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps

      - name: Reproduce canonical CID for cross-leg gate
        # Emits the CID to a file; the cross-leg-gate job downloads every
        # matrix leg's artifact and asserts byte-for-byte equality.
        shell: bash
        run: |
          cargo run --release -p benten-core --example print_canonical_cid --locked > "cid-${{ matrix.leg }}-${{ matrix.rust }}.txt"
          cat "cid-${{ matrix.leg }}-${{ matrix.rust }}.txt"

      - name: Upload CID artifact
        uses: actions/upload-artifact@v7
        with:
          name: cid-${{ matrix.leg }}-${{ matrix.rust }}
          path: cid-${{ matrix.leg }}-${{ matrix.rust }}.txt
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # T6 (wasm32-wasip1 runtime) + T8 (wasm32-unknown-unknown compile check).
  # --------------------------------------------------------------------------
  wasm-runtime:
    name: wasm32 (wasip1 runtime + unknown-unknown compile)
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1,wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm

      - name: Install wasmtime
        uses: bytecodealliance/actions/wasmtime/setup@v1
        with:
          version: "latest"

      - name: Compile-check bindings/napi for wasm32-unknown-unknown
        run: cargo check --target wasm32-unknown-unknown -p benten-napi

      - name: Compile benten-core example for wasm32-wasip1
        run: cargo build --release --target wasm32-wasip1 -p benten-core --example print_canonical_cid --locked

      - name: Run under wasmtime and capture CID
        run: |
          wasmtime target/wasm32-wasip1/release/examples/print_canonical_cid.wasm > cid-wasm32-wasip1.txt
          cat cid-wasm32-wasip1.txt

      - name: Upload wasm CID artifact
        uses: actions/upload-artifact@v7
        with:
          name: cid-wasm32-wasip1
          path: cid-wasm32-wasip1.txt
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Phase 2a R4b COVERAGE M3 â€” release-build no-default-features gate.
  #
  # G11-A Wave 2a (CFG-GATING) flipped `benten-engine/test-helpers` off the
  # default feature set so production / release artefacts do NOT compile
  # the test-only `backend_for_test` / `engine_wait::cache_put` /
  # `testing_force_reregister_with_different_cid` surfaces. The intent
  # was that `cargo check -p benten-engine --no-default-features` would
  # catch any test-only surface accidentally leaking into a default-build
  # path (regressions where a non-test-helper module imports a
  # test-helper item, etc.). Until R4b nothing in CI ran that check â€”
  # the comment at line 111 documented the intent but no workflow
  # asserted it. This job closes that gap.
  #
  # Single linux-x86_64 stable leg is sufficient: release-feature
  # semantics don't drift across legs (a feature-gated symbol is gated
  # everywhere or nowhere). Fast (~2-3 min) so the PR-gate cost is
  # negligible.
  # --------------------------------------------------------------------------
  release-build-gate:
    name: release-build (--no-default-features) gate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-build-gate

      - name: cargo check -p benten-engine --no-default-features
        # Catches: a non-test-helper module accidentally importing a
        # `test-helpers`-gated item; an unused-import that the default
        # feature set masked. The release artefact MUST compile under
        # this exact flag set.
        run: cargo check -p benten-engine --no-default-features --locked

      - name: cargo check -p benten-graph --no-default-features
        # benten-graph carries an analogous `testing` feature for the
        # bloom helpers + `subgraph_bytes_for_handler` test surface. The
        # release crate must build clean without it.
        run: cargo check -p benten-graph --no-default-features --locked

      - name: cargo check -p benten-eval --no-default-features
        # benten-eval carries `testing` (re-exports `MockMonotonicSource`,
        # `register_test_callee`). Release artefacts must compile clean
        # without those â€” the production Inv-8 budget path should never
        # touch the test-callee registry.
        run: cargo check -p benten-eval --no-default-features --locked

      - name: Assert benten-napi feature closure does not pull `test-helpers`
        # Phase-2a R6 round-2 A8 (envelope-cache-test-grade split). The A2
        # split landed `envelope-cache-test-grade = []` as a narrow gate the
        # napi WAIT bridge can opt into without dragging the broader
        # `test-helpers` surface (which lights `backend_for_test`,
        # `testing_force_reregister_with_different_cid`, the bloom hooks,
        # etc.) into the cdylib. This step pins that split structurally:
        # if `bindings/napi`'s default feature closure ever re-broadens to
        # include `test-helpers` (regression â€” e.g. someone adds
        # `test-helpers` to the engine dep's `features = [...]` list), CI
        # fails here. The check resolves the napi crate's transitive
        # feature closure with `--no-default-features` so it reflects the
        # release-mode shape that ships in the published cdylib.
        run: |
          set -euo pipefail
          tree=$(cargo tree -p benten-napi --no-default-features -e features --format "{p} {f}")
          echo "$tree"
          if echo "$tree" | grep -E '^[^ ]*benten-engine[^ ]*\s.*(^| |,)test-helpers( |,|$)'; then
            echo "FAIL: benten-napi --no-default-features closure pulls benten-engine/test-helpers."
            echo "Phase-2a R6r2 A2 split: napi must use envelope-cache-test-grade, not the broader test-helpers gate."
            exit 1
          fi
          echo "OK: benten-napi --no-default-features closure does not include benten-engine/test-helpers."

  # --------------------------------------------------------------------------
  # T9 â€” cross-leg byte-equality gate. Asserts every native leg and the
  # wasm leg produced identical CID bytes. Not just "each matches the
  # committed fixture" â€” that would mask a drift that sneaks into the
  # fixture itself. Every leg must match every other leg.
  # --------------------------------------------------------------------------
  cross-leg-determinism:
    name: cross-leg byte-equality gate (T9)
    needs: [build-and-test, wasm-runtime]
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - name: Download all CID artifacts
        uses: actions/download-artifact@v8
        with:
          path: cids/
          pattern: cid-*

      - name: Assert byte-for-byte equality across every leg
        shell: bash
        run: |
          set -euo pipefail
          declare -A legs
          for dir in cids/cid-*; do
            leg=$(basename "$dir" | sed 's/^cid-//')
            file=$(find "$dir" -type f -name '*.txt' | head -n 1)
            if [ -z "$file" ]; then
              echo "WARN: no .txt inside $dir"
              continue
            fi
            value=$(tr -d '[:space:]' < "$file")
            legs[$leg]="$value"
          done

          echo "Legs observed (${#legs[@]}):"
          for leg in "${!legs[@]}"; do
            printf '  %-40s %s\n' "$leg" "${legs[$leg]}"
          done

          reference_leg=""
          reference_value=""
          for leg in "${!legs[@]}"; do
            reference_leg="$leg"
            reference_value="${legs[$leg]}"
            break
          done

          # Also assert the reference matches the committed fixture so a
          # cross-leg-consistent-but-fixture-drifted state is caught.
          recorded=$(tr -d '[:space:]' < crates/benten-core/tests/fixtures/canonical_cid.txt)
          if [ "$recorded" != "$reference_value" ]; then
            echo "FIXTURE DRIFT: committed fixture is $recorded, legs produced $reference_value"
            echo "If the engine change is intentional, update the fixture in the same PR."
            exit 1
          fi

          drift=0
          for leg in "${!legs[@]}"; do
            if [ "${legs[$leg]}" != "$reference_value" ]; then
              echo "DRIFT: $leg produced ${legs[$leg]}, reference $reference_leg produced $reference_value"
              drift=1
            fi
          done

          if [ $drift -ne 0 ]; then
            echo "T9 CROSS-LEG DETERMINISM GATE FAILED â€” see above for diverging leg(s)."
            exit 1
          fi

          echo "T9 OK: all ${#legs[@]} legs produced the same CID: $reference_value"

  # --------------------------------------------------------------------------
  # Scaffolder cold-install sanity. `npx create-benten-app` produces a
  # project where `npm install && npm run test` exits 0 (the Phase 1
  # headline exit criterion from implementation plan Â§1).
  # --------------------------------------------------------------------------
  cold-install:
    name: create-benten-app cold install
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    # Depends on build-and-test so the bindings/napi artifact is compiled
    # at least once on Linux (the local workspace link path resolves the
    # compiled binary). If we ever publish prebuilt napi binaries, this
    # dependency can be dropped for a truly cold install path.
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: cold-install

      - name: Build napi binding
        # The scaffolder's generated project points at @benten/engine via
        # the repo-root workspace link. That link requires the napi crate
        # to be compiled before `npm install` inside the scaffolded app
        # resolves @benten/engine-native.
        #
        # `npm run build` dispatches through bindings/napi/package.json's
        # "build": "napi build --platform --release" script. Do NOT use
        # `npx @napi-rs/cli build` â€” the package's binary is named `napi`,
        # not `@napi-rs/cli`, so npx reports "could not determine
        # executable to run". Caught the first time this job completed on
        # main (2026-04-22) after dead-macos-13 + cancel-storm had
        # masked it since the workflow was introduced.
        run: |
          cd bindings/napi
          npm install --no-audit --no-fund
          npm run build

      - name: Install workspace deps
        run: npm install --no-audit --no-fund

      - name: Build @benten/engine (compile TS â†’ packages/engine/dist)
        # packages/engine/package.json declares `main: ./dist/index.js` +
        # `exports: { ".": ./dist/index.js }`. dist/ is .gitignore'd, so
        # CI must compile the TypeScript before the scaffolded project's
        # vitest can resolve `@benten/engine`. Without this step, the
        # cold-install test fails with "Failed to resolve entry for
        # package '@benten/engine'" as soon as vitest asks vite to load
        # the package entry. Caught the first time this job reached the
        # scaffolder-test step on main (2026-04-22).
        run: |
          cd packages/engine
          npm run build

      - name: Run scaffolder and test the generated project
        shell: bash
        run: |
          set -euo pipefail
          workdir=$(mktemp -d)
          pushd "$workdir"
          node "$GITHUB_WORKSPACE/tools/create-benten-app/bin.mjs" test-project --skip-install
          cd test-project
          # Re-point @benten/engine at the checked-out repo via npm install.
          # In the scaffolder's default path (outside the repo) this would
          # resolve against the published registry; inside CI we use the
          # local file: link.
          npm install \
            --no-audit --no-fund \
            "$GITHUB_WORKSPACE/packages/engine" \
            "$GITHUB_WORKSPACE/bindings/napi"
          npm install --no-audit --no-fund
          npm run test
          popd
          rm -rf "$workdir"
