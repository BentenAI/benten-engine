name: WASM Conformance (wasm32-wasip1)

# Phase 2b G10-A-wasip1 — wasm32-wasip1 SANDBOX adversarial conformance
# fixture suite (per plan §3.1).
#
# This workflow targets the SANDBOX adversarial fixture batch (fuel-trap,
# memory-kill, no-reentrancy, Inv-7 output-limit, Inv-4 nest-depth,
# module-validation rejection, import-set adversarial, NaN
# canonicalization, etc.) under wasm32-wasip1. The G7-B SANDBOX
# implementation owns the fixture content; G10-A-wasip1 owns the build
# harness that runs the fixtures under wasmtime against the
# wasm32-wasip1 build.
#
# Status:
#   - Today: this workflow runs the SANDBOX-related test surface
#     against the NATIVE build under wasmtime install verification +
#     a wasm32-wasip1 compile-check on the SANDBOX-bearing crates so
#     drift in the SANDBOX path that would break the wasm32-wasip1
#     target fires here at PR time.
#   - When G7-B + G7-C land per-fixture wasm modules under
#     `crates/benten-eval/tests/sandbox-fixtures/*.wat`, this
#     workflow gains a `cargo test --target wasm32-wasip1
#     -p benten-eval --features sandbox-fixtures` step that runs
#     each ESC-1..16 fixture through wasmtime and asserts the
#     expected typed error.
#
# Distinct from `wasm-runtime.yml` (canonical CID + lib smoke) and
# `wasm-browser.yml` (wasm32-unknown-unknown bundle).
#
# Trigger discipline per METH-13: pull_request branches: [main] +
# push branches: [main] + workflow_dispatch.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: wasm-conformance-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  WASMTIME_VERSION: "v26.0.1"

jobs:
  sandbox-wasm-conformance:
    name: SANDBOX adversarial fixture suite — wasm32-wasip1
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust toolchain (stable + wasm32-wasip1)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-wasip1

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install wasmtime ${{ env.WASMTIME_VERSION }}
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/bytecodealliance/wasmtime/releases/download/${WASMTIME_VERSION}/wasmtime-${WASMTIME_VERSION}-x86_64-linux.tar.xz" \
            -o /tmp/wasmtime.tar.xz
          mkdir -p /tmp/wasmtime
          tar -xJf /tmp/wasmtime.tar.xz -C /tmp/wasmtime --strip-components=1
          sudo install -m 0755 /tmp/wasmtime/wasmtime /usr/local/bin/wasmtime
          wasmtime --version

      - name: SANDBOX wasm32-wasip1 compile gate (drift detector)
        # Compile the SANDBOX-bearing benten-eval test surface against
        # wasm32-wasip1. Any native-only dep slipping into the SANDBOX
        # path breaks the wasm-target promise; we want this to fire at
        # PR time, not at release time.
        run: cargo check --target wasm32-wasip1 -p benten-eval

      - name: SANDBOX adversarial native run (ESC-1..16 fixture suite)
        # Per the plan §3 G10-A-wasip1 row, this workflow also runs the
        # adversarial SANDBOX fixture suite to prove fuel-trap, memory-
        # kill, no-reentrancy, Inv-7 output-limit, Inv-4 nest-depth,
        # module-validation rejection, import-set adversarial, NaN
        # canonicalization. The full fixture binaries land alongside
        # G7-B's SANDBOX implementation; until they ship per-target,
        # we run the SANDBOX-flavored test surface natively as the
        # initial gate.
        run: |
          set -euo pipefail
          cargo test -p benten-eval --tests --no-fail-fast 2>&1 | tee sandbox-conformance.log
          echo "::group::Conformance log tail"
          tail -n 100 sandbox-conformance.log || true
          echo "::endgroup::"
