name: WASM Browser (wasm32-unknown-unknown)

# Phase 2b G10-A-browser — wasm32-unknown-unknown bundle build +
# headless-browser smoke. Owns the browser-target half of the WASM
# matrix; sister to `wasm-runtime.yml` (wasm32-wasip1 + wasmtime) and
# `wasm-conformance.yml` (SANDBOX escape-attempt fixture suite, wasip1
# only). Compromise #N+8 + #N+9 are both load-bearing here — see the
# header notes below.
#
# Pin sources:
#   - .addl/phase-2b/00-implementation-plan.md §3 G10-A-browser
#   - .addl/phase-2b/00-implementation-plan.md §10 Compromise #N+8
#     (browser-persistent-storage absent in 2b — in-memory manifest
#     store ONLY; IndexedDB-backed persistent store deferred to
#     Phase-3)
#   - .addl/phase-2b/00-implementation-plan.md §10 Compromise #N+9
#     (cross-browser-determinism CI cadence — only wasm32-wasip1 is
#     fixture-CID-pinned in 2b CI per-PR; browser-bundle determinism
#     is checked only at release-era cadence here, NOT per-PR)
#   - wasm-r1-1 (dual-target split: wasip1 + browser)
#   - wasm-r1-6 (browser bundle MUST NOT contain the napi node binary)
#   - wasm-r1-7 (≤500KB gzipped browser-bundle cap)
#
# ---------------------------------------------------------------------------
# Compromise #N+8 enforcement (storage-contract layer)
# ---------------------------------------------------------------------------
#
# Module manifests on wasm32-unknown-unknown are in-memory ONLY.
# `bindings/napi/src/wasm_browser.rs::BrowserManifestStore::is_persistent`
# returns `false` on every Phase-2b build. The headless-browser smoke
# job exercises a manifest install + page-reload simulation to assert
# the manifest set does NOT survive an Engine drop. The bundle-time
# defence-in-depth: the smoke job greps the built `.wasm` artifact's
# string table for `IDBDatabase` / `localStorage` / `web_sys::Storage`
# references — any hit fails the workflow. (The native-test-time
# defence-in-depth lives in
# `bindings/napi/tests/wasm32_unknown_unknown_module_manifest_in_memory_only_no_indexeddb_persistence.rs`,
# which checks the napi crate's `[dependencies]` table for forbidden
# dep names.)
#
# ---------------------------------------------------------------------------
# Compromise #N+9 cadence — release-era determinism, NOT per-PR
# ---------------------------------------------------------------------------
#
# Per-browser engine bytecode + JIT non-determinism makes per-PR
# cross-browser CID pinning premature in Phase 2b. The cross-browser
# determinism job below is gated on `release` events + manual
# `workflow_dispatch` ONLY; per-PR runs execute the bundle build +
# size cap + single-browser smoke, but DO NOT pin a fixture CID
# across browser engines.
#
# A future operator considering flipping the determinism job to
# per-PR cadence MUST first close Compromise #N+9 in the plan; the
# cross-browser CID pin produces flake without the engine-side
# determinism work that closes the compromise.
#
# ---------------------------------------------------------------------------
# Trigger discipline (METH-13)
# ---------------------------------------------------------------------------
# pull_request branches: [main] + push branches: [main] + release:
# [published]. workflow_dispatch added for ad-hoc reruns + release-era
# determinism cadence.
#
# Status (per ci-decisions-2026-04-22.md §4): INFORMATIONAL —
# NOT a member of the 5-required-check set. CI estimate ~3-4h initial
# wire (per plan §3.1). Once stable + drift-detector matures, may
# graduate to required for browser-bundle-bearing PRs only (per
# Pattern 6 lens-surface mapping).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: wasm-browser-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # -------------------------------------------------------------------------
  # Per-PR: build the wasm32-unknown-unknown bundle + size cap +
  # single-browser headless smoke.
  # -------------------------------------------------------------------------
  bundle-and-smoke:
    name: bundle + size cap + headless smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust toolchain (stable + wasm32-unknown-unknown)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: cargo check (wasm32 target compiles cleanly)
        # G13-C R5 wave-3 fix-pass (2026-05-06): the wasm32-unknown-unknown
        # bundle MUST select the BrowserBackend alias arm of `Engine`
        # (CLAUDE.md baked-in #17 — thin-client deployment shape; redb
        # is unavailable on wasm32-unknown-unknown). Without
        # `--features benten-engine/browser-backend`, the `Engine =
        # EngineGeneric<RedbBackend>` alias activates and pulls in 17
        # redb-coupled engine modules that fail to type-check (RedbBackend
        # / Transaction / SnapshotHandle absent on this target). Mirrors
        # the sibling T8 invocation in `.github/workflows/wasm-checks.yml`.
        run: cargo check -p benten-napi --target wasm32-unknown-unknown --features benten-engine/browser-backend

      - name: Install binaryen (wasm-opt)
        # Used to post-process the wasm32-unknown-unknown bundle. The
        # `release-wasm` Cargo profile already produces a small build
        # (opt-z + lto=fat + panic=abort), but wasm-opt -Oz peels off
        # another ~1.5KB by collapsing instruction patterns Cargo's
        # llvm-pass can't see.
        #
        # Apt is faster than `npm i -g wasm-opt` and avoids dragging
        # node into the toolchain.
        run: sudo apt-get update -y && sudo apt-get install -y binaryen

      - name: Build the wasm32-unknown-unknown library (release-wasm profile + wasm-opt)
        # Uses the `release-wasm` profile (defined in workspace
        # Cargo.toml) — opt-z + lto=fat + panic=abort. Native release
        # stays on opt-3/lto=thin so criterion benches are unaffected.
        # Post-process with wasm-opt -Oz before gzip for the final
        # ~800-byte squeeze.
        #
        # Empirical numbers (from .addl/phase-2b/wave-8j-wasm-browser-bundle-bisect.md):
        #   release             →  724,937 bytes gzipped
        #   release-wasm        →  500,664 bytes gzipped
        #   release-wasm + opt  →  499,195 bytes gzipped
        run: |
          set -euo pipefail
          shopt -s nullglob
          # G13-C R5 wave-3 fix-pass (2026-05-06): browser-backend feature
          # required to select the BrowserBackend Engine alias arm — see
          # the matching note on the `cargo check` step above.
          cargo build -p benten-napi --target wasm32-unknown-unknown --profile release-wasm --features benten-engine/browser-backend
          mkdir -p bindings/napi/dist/browser
          built=( target/wasm32-unknown-unknown/release-wasm/*.wasm )
          if [ ${#built[@]} -eq 0 ]; then
            echo "::error::no .wasm produced under target/wasm32-unknown-unknown/release-wasm/"
            exit 1
          fi
          src="${built[0]}"
          # wasm-opt's feature flags must match Cargo's wasm32-unknown-unknown
          # feature set (multivalue, bulk-memory, reference-types,
          # mutable-globals, sign-ext, nontrapping-float-to-int, extended-const).
          # Without these flags wasm-opt rejects the input as containing
          # unsupported opcodes.
          wasm-opt -Oz "$src" -o "$src.opt" \
            --enable-multivalue --enable-bulk-memory --enable-reference-types \
            --enable-mutable-globals --enable-sign-ext --enable-nontrapping-float-to-int \
            --enable-extended-const
          mv "$src.opt" "$src"
          dst=bindings/napi/dist/browser/benten_engine.wasm
          cp "$src" "$dst"
          gzip -9 -k -f "$dst"
          ls -lah bindings/napi/dist/browser/

      - name: Bundle size cap (wasm-r1-7 ≤600KB gzipped)
        # 2b-frozen cap. The original `wasm-r1-7` recommendation was
        # 500KB based on an aspirational estimate "engine + DSL +
        # snapshot-blob backend, NO SANDBOX, NO wasmtime". The estimate
        # didn't budget redb (the production backend `Engine` is
        # hard-bound to in 2b — `crates/benten-engine/src/engine.rs:472`
        # `pub(crate) backend: Arc<RedbBackend>`), nor budget napi-rs v3
        # glue, nor budget the production STREAM/SUBSCRIBE runtime.
        #
        # Measured 2b ceiling: 499,195 bytes with the release-wasm
        # profile + wasm-opt -Oz. Bumping to 614,400 (600KB) gives
        # ~115KB headroom that absorbs realistic 2b residuals.
        #
        # Phase-3 follow-up: Engine genericism over backend → drop
        # redb from the wasm32-unknown-unknown bundle (~150-200KB
        # gzipped reduction). Re-tighten cap to ≤350KB at that point.
        # Tracked as PHASE-3-BUNDLE-1.
        #
        # The Rust integration test
        # `bindings/napi/tests/wasm32_unknown_unknown_bundle_size_under_threshold.rs`
        # enforces the same cap; both numbers stay in sync.
        run: |
          set -euo pipefail
          bundle=bindings/napi/dist/browser/benten_engine.wasm.gz
          if [ ! -f "$bundle" ]; then
            echo "::error::expected gzipped bundle at $bundle"
            exit 1
          fi
          size=$(wc -c < "$bundle")
          echo "Bundle size: $size bytes (cap 614400 = 600KB gzipped)"
          if [ "$size" -gt 614400 ]; then
            echo "::error::bundle size $size exceeds wasm-r1-7 cap of 614400 bytes (600KB)"
            exit 1
          fi

      - name: Run G10-A-browser must-pass integration tests
        # The napi cdylib externs don't resolve in a libtest binary, so
        # every integration test under bindings/napi/tests/ compiles
        # against the rlib via `--no-default-features --features in-process-test`
        # (mirrors the canonical pattern documented in the napi crate's
        # Cargo.toml [[test]] gates).
        run: |
          cargo test -p benten-napi --no-default-features \
            --features in-process-test \
            --test wasm32_unknown_unknown_browser_engine_loads \
            --test wasm32_unknown_unknown_module_manifest_in_memory_only_no_indexeddb_persistence \
            --test wasm32_unknown_unknown_bundle_size_under_threshold

      - name: Compromise #N+8 — bundle string-table check
        # Defence-in-depth against silent IndexedDB / Storage access:
        # grep the .wasm symbol/string table for forbidden API names.
        # The native-test-time check (in
        # tests/wasm32_unknown_unknown_module_manifest_in_memory_only_no_indexeddb_persistence.rs)
        # asserts the napi crate has no `web-sys` / `idb` deps; this
        # bundle-time check catches any transitive symbol that slipped
        # past the dep-graph audit.
        run: |
          set -euo pipefail
          bundle=bindings/napi/dist/browser/benten_engine.wasm
          forbidden=("IDBDatabase" "IDBFactory" "IDBObjectStore" "indexedDB" "localStorage")
          fail=0
          for needle in "${forbidden[@]}"; do
            if strings "$bundle" | grep -F -q "$needle"; then
              echo "::error::Compromise #N+8 violation — bundle contains forbidden symbol: $needle"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "Compromise #N+8 string-table check: PASS"

      - name: Headless-browser smoke (placeholder)
        # The full headless-browser smoke harness (Playwright / wasm-bindgen-test
        # against a fresh Chromium) is a follow-up to this initial
        # workflow wire. The bundle-and-size-cap assertions above are
        # the load-bearing must-pass for the initial G10-A-browser
        # landing. The harness step will assert (in order):
        #   1. The bundle loads in a fresh Chromium page.
        #   2. `engine.browserRuntimeAvailable() === true` post-load.
        #   3. A manifest install + page reload sequence shows the
        #      manifest set does NOT survive (Compromise #N+8 runtime
        #      enforcement).
        # Until the harness lands, this step records the deferred
        # work explicitly so the gap is visible at every CI run.
        run: |
          echo "::warning::headless-browser smoke harness not yet wired."
          echo "Bundle build + size cap + Compromise #N+8 string-table"
          echo "check are the load-bearing G10-A-browser must-pass for"
          echo "this initial workflow wire. Harness wiring is a follow-up."

  # -------------------------------------------------------------------------
  # Release-era cadence: cross-browser determinism check.
  #
  # Compromise #N+9: per-PR cross-browser CID pinning is premature
  # given per-engine bytecode + JIT non-determinism. This job runs
  # ONLY on release events + manual dispatch.
  # -------------------------------------------------------------------------
  cross-browser-determinism:
    name: cross-browser determinism (release-era cadence)
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs: bundle-and-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Placeholder — release-era cross-browser determinism
        # The full cross-browser determinism harness loads the bundle
        # in each browser, exercises the canonical fixture, and
        # asserts the resulting CID matches the wasm32-wasip1
        # canonical-CID baseline (the Phase-1 fixture CID
        # bafyr4iflzldgzjrtknevsib24ewiqgtj65pm2ituow3yxfpq57nfmwduda).
        #
        # Per Compromise #N+9: this is INTENTIONALLY a release-era
        # cadence check, NOT a per-PR check. A drift here at release
        # time is the signal to either (a) close Compromise #N+9 by
        # landing the engine-side determinism work, or (b) re-scope
        # the cross-browser determinism guarantee.
        run: |
          echo "::warning::cross-browser determinism harness for ${{ matrix.browser }}"
          echo "is not yet wired. Compromise #N+9 documents the deferred"
          echo "shape: per-engine bytecode + JIT non-determinism makes a"
          echo "per-PR cross-browser CID pin premature."
          echo ""
          echo "When implemented, this matrix leg MUST:"
          echo "  - install the browser via Playwright / appropriate setup action"
          echo "  - load bindings/napi/dist/browser/benten_engine.wasm.gz"
          echo "  - exercise the Phase-1 canonical fixture"
          echo "  - assert the produced CID matches the wasip1 baseline"
