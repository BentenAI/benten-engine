name: WASM Browser (wasm32-unknown-unknown)

# Phase-3 R6 fix-pass Wave B — wasm32-unknown-unknown bundle build +
# bundle-content audit (CLAUDE.md baked-in #17 defense-in-depth rung 3)
# + size cap. Owns the browser-target half of the WASM matrix; sister
# to `wasm-runtime.yml` (wasm32-wasip1 + wasmtime), `wasm-conformance.yml`
# (SANDBOX escape-attempt fixture suite, wasip1 only), and
# `cross-browser-determinism.yml` (Playwright matrix landed at G18-A
# wave-5a per Compromise #20 closure narrative; per-PR cadence).
#
# Pin sources:
#   - .addl/phase-2b/00-implementation-plan.md §3 G10-A-browser
#     (original Phase-2b landing).
#   - .addl/phase-3/00-implementation-plan.md §3 G18-A wave-5a
#     (cross-browser determinism workflow split-out).
#   - docs/future/phase-3-backlog.md §4.4 (R6 fix-pass Wave B
#     bundle-content audit, this commit).
#   - docs/future/phase-3-backlog.md §4.3 (G18-A-followup IndexedDB
#     plumbing + Playwright fixture authoring — V1-WINDOW NAMED).
#   - docs/SECURITY-POSTURE.md Compromise #19 (browser persistent
#     storage — PARTIALLY CLOSED; full closure deferred to G18-A-followup).
#   - docs/SECURITY-POSTURE.md Compromise #20 (cross-browser determinism
#     CI cadence — PARTIALLY CLOSED; full closure deferred to G18-A-followup).
#   - wasm-r1-1 (dual-target split: wasip1 + browser).
#   - wasm-r1-6 (browser bundle MUST NOT contain the napi node binary).
#   - wasm-r1-7 (≤600KB gzipped browser-bundle cap; raised from 500KB
#     during Phase-2b wave-8j bundle bisect).
#
# ---------------------------------------------------------------------------
# CLAUDE.md baked-in #17 — bundle-content audit (defense-in-depth rung 3)
# ---------------------------------------------------------------------------
#
# Per CLAUDE.md baked-in #17 (full peer vs thin compute surface), the
# browser bundle is a THIN-CLIENT VIEW — Loro CRDT, iroh networking,
# redb durable backend, and wasmtime SANDBOX runtime are NATIVE-ONLY.
# Three rungs of defense-in-depth defend the architectural commitment:
#
#   1. Source-side cfg-gating — `crates/benten-sync/src/lib.rs`
#      `compile_error!` for `target_arch = "wasm32"` + Cargo.toml
#      `[target.'cfg(not(target_arch = "wasm32"))'.dependencies]`.
#      Pinned by `crates/benten-sync/tests/wasm32_excluded.rs`.
#   2. Cargo feature-graph closure — no transitive activation of
#      full-peer crates from the browser-bundle root. Pinned by
#      `bindings/napi/tests/feature_graph_closure_no_test_helpers_in_production.rs`.
#   3. Built-bundle symbol-section audit — the `bundle-content audit
#      (forbidden symbols per baked-in #17)` step below runs
#      `wasm-objdump -x` against the produced `.wasm` artifact and
#      asserts ZERO matches against the forbidden-symbol blocklist
#      (loro / iroh / redb / wasmtime). Pinned by
#      `bindings/napi/tests/wasm_bundle_content.rs`.
#
# A regression where a future feature on a sibling crate transitively
# pulls iroh-net or loro-internal into the wasm32 dep-graph would be
# silently accepted by rungs 1 + 2 IF the feature-graph walk missed the
# cell; rung 3 closes the gap by inspecting the actual emitted bytes.
#
# ---------------------------------------------------------------------------
# Compromise #19 transitional IDB string-table guard
# ---------------------------------------------------------------------------
#
# At HEAD the wasm32 IDB plumbing (`web-sys` / `js-sys` / `wasm-bindgen-futures`
# adapters in `bindings/napi/src/browser_indexeddb.rs::apply_migration_step`)
# is a stub deferred to G18-A-followup per phase-3-backlog §4.3.
# `BrowserManifestStore::is_persistent()` returns `false` honestly. The
# `IDBDatabase` / `localStorage` / `web_sys::Storage` string-table guard
# stays ACTIVE as a fail-closed defense against accidental persistence
# symbol leakage ahead of the named G18-A-followup wave; it retires (or
# flips to a positive-presence assertion) when that wave wires real IDB
# bindings into the bundle.
#
# ---------------------------------------------------------------------------
# Compromise #20 — cross-browser determinism cadence (RETIRED here)
# ---------------------------------------------------------------------------
#
# Phase-2b deferred cross-browser determinism CI to release-era cadence
# (the legacy `cross-browser-determinism` matrix below was gated on
# release + workflow_dispatch only). At Phase-3 G18-A wave-5a, the
# dedicated `.github/workflows/cross-browser-determinism.yml` Playwright
# matrix workflow lands per-PR cadence with flake-budget retry policy
# (1 retry on browser-launch failure; budget = 3 launches per 24h;
# promotion-to-required after 30 days informational green per br-r1-10).
# That workflow asserts canonical-bytes determinism + CID-pin equivalence
# across Chromium / Gecko / WebKit per br-r1-4 WHAT FAILS framing +
# IndexedDB schema-migration round-trip + 1000-key no-data-loss sweep
# per D-PHASE-3-27 + QuotaExceededError → E_STORAGE_QUOTA_EXCEEDED
# mapping per br-r1-2.
#
# The legacy `cross-browser-determinism` job below is a NO-OP placeholder
# kept to avoid workflow-id churn at the branch-protection layer; it is
# RETIRED in spirit (replaced by `cross-browser-determinism.yml`).
#
# ---------------------------------------------------------------------------
# Trigger discipline (METH-13)
# ---------------------------------------------------------------------------
# pull_request branches: [main] + push branches: [main] + release:
# [published]. workflow_dispatch added for ad-hoc reruns + release-era
# determinism cadence.
#
# Status (per ci-decisions-2026-04-22.md §4): INFORMATIONAL —
# NOT a member of the 5-required-check set. CI estimate ~3-4h initial
# wire (per plan §3.1). Once stable + drift-detector matures, may
# graduate to required for browser-bundle-bearing PRs only (per
# Pattern 6 lens-surface mapping).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: wasm-browser-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # -------------------------------------------------------------------------
  # Per-PR: build the wasm32-unknown-unknown bundle + size cap +
  # single-browser headless smoke.
  # -------------------------------------------------------------------------
  bundle-and-smoke:
    name: bundle + size cap + headless smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust toolchain (stable + wasm32-unknown-unknown)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: cargo check (wasm32 target compiles cleanly)
        # G13-C R5 wave-3 fix-pass (2026-05-06): the wasm32-unknown-unknown
        # bundle MUST select the BrowserBackend alias arm of `Engine`
        # (CLAUDE.md baked-in #17 — thin-client deployment shape; redb
        # is unavailable on wasm32-unknown-unknown). Without
        # `--features benten-engine/browser-backend`, the `Engine =
        # EngineGeneric<RedbBackend>` alias activates and pulls in 17
        # redb-coupled engine modules that fail to type-check (RedbBackend
        # / Transaction / SnapshotHandle absent on this target). Mirrors
        # the sibling T8 invocation in `.github/workflows/wasm-checks.yml`.
        run: cargo check -p benten-napi --target wasm32-unknown-unknown --features benten-engine/browser-backend

      - name: Install binaryen (wasm-opt)
        # Used to post-process the wasm32-unknown-unknown bundle. The
        # `release-wasm` Cargo profile already produces a small build
        # (opt-z + lto=fat + panic=abort), but wasm-opt -Oz peels off
        # another ~1.5KB by collapsing instruction patterns Cargo's
        # llvm-pass can't see.
        #
        # Apt is faster than `npm i -g wasm-opt` and avoids dragging
        # node into the toolchain.
        run: sudo apt-get update -y && sudo apt-get install -y binaryen

      - name: Build the wasm32-unknown-unknown library (release-wasm profile + wasm-opt)
        # Uses the `release-wasm` profile (defined in workspace
        # Cargo.toml) — opt-z + lto=fat + panic=abort. Native release
        # stays on opt-3/lto=thin so criterion benches are unaffected.
        # Post-process with wasm-opt -Oz before gzip for the final
        # ~800-byte squeeze.
        #
        # Empirical numbers (from .addl/phase-2b/wave-8j-wasm-browser-bundle-bisect.md):
        #   release             →  724,937 bytes gzipped
        #   release-wasm        →  500,664 bytes gzipped
        #   release-wasm + opt  →  499,195 bytes gzipped
        run: |
          set -euo pipefail
          shopt -s nullglob
          # G13-C R5 wave-3 fix-pass (2026-05-06): browser-backend feature
          # required to select the BrowserBackend Engine alias arm — see
          # the matching note on the `cargo check` step above.
          cargo build -p benten-napi --target wasm32-unknown-unknown --profile release-wasm --features benten-engine/browser-backend
          mkdir -p bindings/napi/dist/browser
          built=( target/wasm32-unknown-unknown/release-wasm/*.wasm )
          if [ ${#built[@]} -eq 0 ]; then
            echo "::error::no .wasm produced under target/wasm32-unknown-unknown/release-wasm/"
            exit 1
          fi
          src="${built[0]}"
          # wasm-opt's feature flags must match Cargo's wasm32-unknown-unknown
          # feature set (multivalue, bulk-memory, reference-types,
          # mutable-globals, sign-ext, nontrapping-float-to-int, extended-const).
          # Without these flags wasm-opt rejects the input as containing
          # unsupported opcodes.
          wasm-opt -Oz "$src" -o "$src.opt" \
            --enable-multivalue --enable-bulk-memory --enable-reference-types \
            --enable-mutable-globals --enable-sign-ext --enable-nontrapping-float-to-int \
            --enable-extended-const
          mv "$src.opt" "$src"
          dst=bindings/napi/dist/browser/benten_engine.wasm
          cp "$src" "$dst"
          gzip -9 -k -f "$dst"
          ls -lah bindings/napi/dist/browser/

      - name: Bundle size cap (wasm-r1-7 ≤600KB gzipped)
        # 2b-frozen cap. The original `wasm-r1-7` recommendation was
        # 500KB based on an aspirational estimate "engine + DSL +
        # snapshot-blob backend, NO SANDBOX, NO wasmtime". The estimate
        # didn't budget redb (the production backend `Engine` is
        # hard-bound to in 2b — `crates/benten-engine/src/engine.rs:472`
        # `pub(crate) backend: Arc<RedbBackend>`), nor budget napi-rs v3
        # glue, nor budget the production STREAM/SUBSCRIBE runtime.
        #
        # Measured 2b ceiling: 499,195 bytes with the release-wasm
        # profile + wasm-opt -Oz. Bumping to 614,400 (600KB) gives
        # ~115KB headroom that absorbs realistic 2b residuals.
        #
        # Phase-3 follow-up: Engine genericism over backend → drop
        # redb from the wasm32-unknown-unknown bundle (~150-200KB
        # gzipped reduction). Re-tighten cap to ≤350KB at that point.
        # Tracked as PHASE-3-BUNDLE-1.
        #
        # The Rust integration test
        # `bindings/napi/tests/wasm32_unknown_unknown_bundle_size_under_threshold.rs`
        # enforces the same cap; both numbers stay in sync.
        run: |
          set -euo pipefail
          bundle=bindings/napi/dist/browser/benten_engine.wasm.gz
          if [ ! -f "$bundle" ]; then
            echo "::error::expected gzipped bundle at $bundle"
            exit 1
          fi
          size=$(wc -c < "$bundle")
          echo "Bundle size: $size bytes (cap 614400 = 600KB gzipped)"
          if [ "$size" -gt 614400 ]; then
            echo "::error::bundle size $size exceeds wasm-r1-7 cap of 614400 bytes (600KB)"
            exit 1
          fi

      - name: Run G10-A-browser + G18-A must-pass integration tests
        # The napi cdylib externs don't resolve in a libtest binary, so
        # every integration test under bindings/napi/tests/ compiles
        # against the rlib via `--no-default-features --features in-process-test`
        # (mirrors the canonical pattern documented in the napi crate's
        # Cargo.toml [[test]] gates).
        #
        # G18-A wave-5a additions: browser_manifest_store (is_persistent
        # flip per br-r1-8), browser_blob_backend (IndexedDB BlobBackend
        # variant per G14-C trait surface), indexeddb_schema (D-PHASE-3-27
        # schema-versioning + onupgradeneeded + onversionchange +
        # QuotaExceededError mapping), cross_browser_determinism_workflow_pins
        # (12 source-cite assertions for the Playwright matrix workflow).
        run: |
          cargo test -p benten-napi --no-default-features \
            --features in-process-test \
            --test wasm32_unknown_unknown_browser_engine_loads \
            --test wasm32_unknown_unknown_module_manifest_in_memory_only_no_indexeddb_persistence \
            --test wasm32_unknown_unknown_bundle_size_under_threshold \
            --test browser_manifest_store \
            --test browser_blob_backend \
            --test indexeddb_schema \
            --test cross_browser_determinism_workflow_pins

      - name: Install wabt (wasm-objdump for bundle-content audit)
        # `wasm-objdump` ships in the WebAssembly Binary Toolkit (wabt).
        # Apt provides a recent-enough version for symbol-section walking;
        # we don't need the full wabt feature set, just `wasm-objdump -x`.
        run: sudo apt-get install -y wabt

      - name: Bundle-content audit (forbidden symbols per CLAUDE.md baked-in #17)
        # CLAUDE.md baked-in #17 defense-in-depth rung 3 — built-bundle
        # symbol-section audit. Closes R6 br-r6-r1-1 BLOCKER + ds-r6-2
        # MAJOR per `.addl/phase-3/r6-r1-browser-wasm-bundle.json` +
        # `r6-r1-distributed-systems.json`. Closes phase-3-backlog §4.4
        # NAMED-NOW destination.
        #
        # The browser bundle MUST NOT contain symbols from the 4
        # forbidden full-peer-only crate prefixes per CLAUDE.md
        # baked-in #17 (full peer vs thin compute surface):
        #
        #   - `loro` / `loro-internal` — full-peer CRDT
        #   - `iroh` / `iroh-net` / `iroh-blobs` — full-peer networking
        #   - `redb` — full-peer durable backend
        #   - `wasmtime` — SANDBOX runtime (full-peer only)
        #
        # `wasm-objdump -x` walks all sections (imports / exports /
        # custom name section when present / function names). We grep
        # the dump output for the 4 forbidden prefixes and fail
        # immediately on any match. Pinned by
        # `bindings/napi/tests/wasm_bundle_content.rs`.
        run: |
          set -euo pipefail
          bundle=bindings/napi/dist/browser/benten_engine.wasm
          if [ ! -f "$bundle" ]; then
            echo "::error::expected bundle artifact at $bundle"
            exit 1
          fi
          dump=$(wasm-objdump -x "$bundle")
          # Forbidden-symbol blocklist. Strings checked include both
          # crate-prefix forms (e.g. `loro_`, `loro::`) and namespaced
          # mangled forms (`iroh_net::`, `iroh_blobs::`). The grep is
          # case-insensitive to catch both `Loro` (Rust type names) and
          # `loro_` (function manglings).
          forbidden=( "loro" "iroh" "redb" "wasmtime" )
          fail=0
          for sym in "${forbidden[@]}"; do
            if echo "$dump" | grep -i -F -q "$sym"; then
              echo "::error::browser bundle MUST NOT contain forbidden symbol prefix '$sym' per CLAUDE.md baked-in #17 (full peer vs thin compute surface). Loro / iroh / redb / wasmtime are full-peer-only; browser bundle is thin-client cache only."
              echo "Matching wasm-objdump output:"
              echo "$dump" | grep -i -F "$sym" | head -10
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then
            exit 1
          fi
          echo "Bundle-content audit PASSED: no loro / iroh / redb / wasmtime symbols leaked into the wasm32-unknown-unknown browser bundle (CLAUDE.md baked-in #17 defense-in-depth rung 3)."

      - name: IDB / localStorage string-table guard (Compromise #19 transitional)
        # HONEST DISCLOSURE per Compromise #19 PARTIALLY CLOSED. The
        # IndexedDB schema + handler scaffolding landed at
        # `bindings/napi/src/browser_indexeddb.rs` BUT the wasm32
        # `web-sys` / `js-sys` / `wasm-bindgen-futures` plumbing is
        # deferred to G18-A-followup wave per
        # `docs/future/phase-3-backlog.md` §4.3. Until that plumbing
        # wires, the bundle does NOT contain IDB symbols — the
        # forbidden-symbol grep stays ACTIVE as a fail-closed guard
        # against accidental `localStorage` / IDB usage slipping in
        # via a transitive dep ahead of the named G18-A-followup
        # surface. The guard retires (or flips to a positive-presence
        # assertion) at G18-A-followup when the wasm32 IDB plumbing
        # actually lands and bundles real symbols.
        run: |
          set -euo pipefail
          bundle=bindings/napi/dist/browser/benten_engine.wasm
          forbidden=( "IDBDatabase" "IDBFactory" "IDBObjectStore" "IDBTransaction" "indexedDB" "localStorage" )
          fail=0
          for sym in "${forbidden[@]}"; do
            if strings "$bundle" | grep -F -q "$sym"; then
              echo "::error::bundle references forbidden symbol '$sym' — Compromise #19 wasm32 IDB plumbing is deferred to G18-A-followup; symbols MUST NOT appear in the bundle until that wave wires per docs/future/phase-3-backlog.md §4.3"
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then
            exit 1
          fi
          echo "string-table guard PASSED — no IDB / localStorage symbols leaked into the bundle (wasm32 IDB plumbing deferred to G18-A-followup)"

      - name: Headless-browser smoke (deferred to G18-A-followup wave per phase-3-backlog §4.3)
        # The full headless-browser smoke harness is the Playwright
        # matrix at `.github/workflows/cross-browser-determinism.yml`
        # (landed at Phase-3 G18-A wave-5a per Compromise #20 closure
        # narrative). The 11 fixture bodies that drive each matrix cell
        # are deferred to the named G18-A-followup wave per
        # `docs/future/phase-3-backlog.md` §4.3 (IndexedDB plumbing +
        # Playwright fixture authoring; ~500-1000 LOC total estimate).
        # Until that wave lands, this step records the deferred work
        # so the gap is visible at every CI run.
        run: |
          echo "::warning::headless-browser smoke harness deferred to G18-A-followup wave per docs/future/phase-3-backlog.md §4.3 (IndexedDB plumbing + Playwright fixture authoring). The cross-browser-determinism.yml workflow's 11 matrix cells are STRUCTURAL anchors at HEAD; fixture bodies land at G18-A-followup."
          echo "Load-bearing must-pass for this workflow at HEAD: bundle build + ≤600KB gzip cap + bundle-content audit (CLAUDE.md baked-in #17 defense-in-depth rung 3) + Compromise #19 transitional IDB guard."

  # -------------------------------------------------------------------------
  # Legacy `cross-browser-determinism` job — RETIRED at Phase-3 G18-A
  # wave-5a (replaced by `.github/workflows/cross-browser-determinism.yml`
  # per-PR Playwright matrix per Compromise #20 closure narrative).
  #
  # Kept here as a no-op placeholder ONLY to avoid workflow-id churn
  # at the branch-protection layer. Future cleanup commit will remove
  # the job entirely once branch-protection settles.
  # -------------------------------------------------------------------------
  cross-browser-determinism-retired:
    name: cross-browser determinism (RETIRED — see cross-browser-determinism.yml)
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs: bundle-and-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Retirement notice
        # Per `docs/SECURITY-POSTURE.md` Compromise #20 closure narrative:
        # the per-PR cross-browser determinism Playwright matrix landed
        # at Phase-3 G18-A wave-5a in
        # `.github/workflows/cross-browser-determinism.yml`. This legacy
        # release-era-cadence job is RETIRED; it remains as a no-op
        # only to avoid workflow-id churn at the branch-protection layer.
        run: |
          echo "::warning::This legacy cross-browser-determinism job is RETIRED."
          echo "The active per-PR Playwright matrix lives at .github/workflows/cross-browser-determinism.yml"
          echo "per Phase-3 G18-A wave-5a Compromise #20 closure (docs/SECURITY-POSTURE.md)."
