name: cargo-public-api (API drift detector)

# Phase-3 G20-A3 wave-8a — cargo-public-api workflow per
# `.addl/phase-3/00-implementation-plan.md` §3 G20-A3 +
# `docs/future/phase-3-backlog.md` §7.3.A.9 (sub-cluster 9a). Replaces
# the Phase-2b R4-FP B-3 RED-PHASE STUB.
#
# Trigger discipline per METH-13: pull_request branches: [main] +
# push branches: [main]. workflow_dispatch added for ad-hoc baseline
# refresh runs. No `push: branches: ['**']`.
#
# Status (per ci-decisions-2026-04-22.md §4): INFORMATIONAL ONLY — not
# a member of the required-check set. Drift surfaces as a PR comment /
# step summary so reviewers can decide "intentional addition,
# baseline-update needed" vs "accidental break, fix the patch."
# Promotion to required is a Phase-9+ OSS-launch-era decision.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cargo-public-api-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-public-api:
    name: API drift detector (informational)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0   # need full history for main..HEAD diff

      - name: Install Rust nightly (cargo-public-api requires nightly rustdoc-json)
        # SHA pin is the dtolnay/rust-toolchain action code; `toolchain: nightly`
        # below is what selects the actual nightly compiler. SHA is from the
        # `stable` branch head (Dependabot-rotated) — action code is branch-agnostic.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # action SHA from stable; toolchain: nightly below
        with:
          toolchain: nightly

      - name: Install cargo-public-api (prebuilt)
        # taiki-e/install-action: ~3s for prebuilt cargo-public-api vs
        # ~120s for `cargo install --locked cargo-public-api` from
        # source. Pin to the action SHA + tool name; cargo-public-api
        # versioning is the tool's own.
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2
        with:
          tool: cargo-public-api

      - name: Diff public API surface against committed baselines (informational)
        # Per-crate diff: cargo-public-api emits the public surface in
        # text form; we compare against `docs/public-api/<crate>.txt`
        # baselines committed at G20-A3. Drift surfaces as a step
        # summary; the workflow always exits 0 (informational gate).
        shell: bash
        run: |
          set -o pipefail
          {
            echo '## cargo-public-api drift report'
            echo
            for crate in benten-core benten-errors benten-graph benten-caps benten-ivm benten-eval benten-engine benten-dsl-compiler; do
              echo "### $crate"
              echo
              echo '```'
              cargo +nightly public-api --simplified -p "$crate" 2>&1 | diff -u "docs/public-api/$crate.txt" - || true
              echo '```'
              echo
            done
          } | tee -a "$GITHUB_STEP_SUMMARY"
