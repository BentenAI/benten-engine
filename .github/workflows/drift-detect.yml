name: Error Catalog Drift Detector (T7)

# Phase 1 R3 security harness. Fails if `docs/ERROR-CATALOG.md`, the Rust
# `ErrorCode` enum at `crates/benten-errors/src/lib.rs`, and the
# generated TS types at `packages/engine/src/errors.ts` diverge.
#
# The detector is bidirectional: a variant present in any one source but
# missing from the other two triggers a named-variant failure. This matches
# the R1 triage T7 spec + the security-auditor finding #11 remediation:
#
#   - CI status check is REQUIRED on every PR (blocking merge).
#   - The unknown-code runtime fallback (`ErrorCode::Unknown(String)`) is
#     tested separately in `crates/benten-errors/tests/stable_shape.rs` and
#     `crates/benten-core/tests/error_codes.rs`; the drift-detector's own
#     failure mode is tested here by running it against a deliberately-
#     missing-variant fixture in `test-drift-detector-fails`.
#
# Cross-refs:
#   - .addl/phase-1/r1-security-auditor.json finding #11
#   - .addl/phase-1/r1-triage.md T7 disposition
#   - .addl/phase-1/r2-test-landscape.md §8 `T7 error-catalog drift detector`

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: drift-detect-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  drift-detect:
    name: docs ↔ Rust enum ↔ TS types parity
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install workspace dev dependencies (tsx for TS script runner)
        # `node --import tsx` resolves `tsx` through normal ESM resolution
        # starting at CWD, so a workspace-root npm install (which includes
        # the tsx devDependency) is the only form that works. A global
        # install does NOT populate the local node_modules and node
        # refuses to resolve the loader.
        run: npm install --ignore-scripts --no-audit --no-fund

      # ci-forensics-2026-04-22 Root Cause C: the regen-freshness check was
      # only wired in ci.yml's (now-deleted) inline drift-detector job.
      # Because ci.yml was cancel-stormed on every push, the standalone
      # drift-detect.yml passed (structural parity is narrower) while
      # `errors.generated.ts` drifted against `benten-errors/src/lib.rs`
      # fix-hint edits across multiple commits. The standalone now owns the
      # regen-freshness gate too — this file is the single source of truth
      # for T7 and runs on every push/PR.
      - name: Regenerate TS error classes from catalog
        run: node --import tsx scripts/codegen-errors.ts

      - name: Verify errors.generated.ts is checked in and up to date
        run: |
          if ! git diff --quiet -- packages/engine/src/errors.generated.ts; then
            echo "errors.generated.ts is out of date. Run 'npm run codegen:errors' and commit the result."
            git --no-pager diff -- packages/engine/src/errors.generated.ts
            exit 1
          fi

      - name: Run the drift detector (bidirectional)
        run: node --import tsx scripts/drift-detect.ts
        # The script exits non-zero on ANY of:
        #   - variant in ERROR-CATALOG but not in Rust enum
        #   - variant in Rust enum but not in ERROR-CATALOG
        #   - variant in Rust enum but not in errors.ts
        #   - variant in errors.ts but not in Rust enum
        # The error message names the specific missing variant for lightning-
        # fast triage. This is load-bearing for R1 security finding #11.

  test-drift-detector-fails:
    name: self-test (meta-assertion that the detector actually detects)
    runs-on: ubuntu-24.04
    # This job exercises the drift-detector against a fixture that INJECTS
    # a missing variant. If the detector passes on the fixture, the
    # detector itself is broken (silent-pass) and the primary drift-detect
    # job is vacuous. Catches the degenerate "detector always succeeds"
    # regression.
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install workspace dev dependencies (tsx for TS script runner)
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Drift-detector self-test must succeed
        # The detector ships its own fixture-injection self-test via the
        # `--self-test` flag: it seeds a known-unreachable and a known-
        # reachable variant and asserts the reachability pass classifies
        # them correctly. If this job passes but the primary drift-detect
        # job also unconditionally passes, the detector is still doing
        # real work (self-test exercises the failing code paths).
        run: node --import tsx scripts/drift-detect.ts --self-test
