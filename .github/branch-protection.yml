# Branch-protection spec for `BentenAI/benten-engine` `main`.
#
# Closes Phase-2a CI-1 deferral (`.addl/phase-2a/00-implementation-plan.md`
# §9.16) — required-status-check set decided in
# `.addl/phase-2a/ci-decisions-2026-04-22.md` §4 was documentation-only
# until this spec landed. Encoded as the JSON shape that the GitHub
# branch-protection PUT endpoint accepts so `gh api` can apply it
# verbatim. The companion workflow
# `.github/workflows/branch-protection-spec-check.yml` diffs live state
# against this spec and warns (or, with STRICT_PROTECTION_CHECK=true,
# fails) on drift, making the spec load-bearing rather than aspirational.
#
# === Apply runbook ===
#
# Step 1 (one-shot, requires PAT with `repo` admin scope or fine-grained
# token with "Administration: Read and write" on this repo).
#
# Preferred (yq):
#
#   gh api -X PUT /repos/BentenAI/benten-engine/branches/main/protection \
#     --input <(yq -o=json '.protection' .github/branch-protection.yml)
#
# (`yq` v4+ via `brew install yq`.)
#
# No-yq alternative (PyYAML — preinstalled on macOS system Python and
# most dev workstations; install via `pip3 install pyyaml` if missing):
#
#   python3 -c "import yaml,json; json.dump(yaml.safe_load(open('.github/branch-protection.yml'))['protection'], open('/tmp/bp.json','w'))" \
#     && gh api -X PUT /repos/BentenAI/benten-engine/branches/main/protection --input /tmp/bp.json
#
# (Hand-translating the spec to JSON also works; the structure mirrors
# the API verbatim.)
#
# Verify:
#
#   gh api /repos/BentenAI/benten-engine/branches/main/protection | jq .
#
# === Enable live drift-check (the spec-check workflow) ===
#
# GitHub's GITHUB_TOKEN cannot read branch-protection state — only PATs
# and GitHub Apps can call that endpoint. Without a PAT the workflow
# degrades to spec-YAML-validation only (warning-level, doesn't fail).
# To enable real drift-check:
#
# Step 2: Create a fine-grained PAT scoped to this repo with
#   `Administration: Read` permission (Settings → Developer settings →
#   Personal access tokens → Fine-grained tokens → Generate new token).
#   Or a classic PAT with `repo` scope works too.
#
# Step 3: Store the PAT as a repo secret named
#   `BRANCH_PROTECTION_READ_TOKEN` (Settings → Secrets and variables →
#   Actions → New repository secret).
#
# After Step 3 the spec-check workflow will pull live state and diff it.
#
# === Make drift fail (instead of warn) ===
#
# Step 4 (after Steps 1+2+3 land + a green workflow run confirms drift=0):
#   either flip `STRICT_PROTECTION_CHECK_DEFAULT: 'false'` -> `'true'`
#   in `.github/workflows/branch-protection-spec-check.yml`, or set repo
#   Variable `STRICT_PROTECTION_CHECK=true` (Settings -> Secrets and
#   variables -> Actions -> Variables) to flip without code change.
#
# === Spec ===

protection:
  # ---- Required status checks ----
  #
  # Each entry below is a JOB context string as it renders in the Checks
  # tab — branch-protection matches against context strings, not
  # workflow names. (Verified against actual rendered names via
  # `gh pr checks <PR>`; matrix legs render as "<job-name> (<leg>)" and
  # plain jobs render as their `name:` field verbatim.)
  #
  # Aggregator-job pattern: where a workflow has a `needs:`-chained
  # umbrella job, only the umbrella is required (it will only succeed
  # if its dependencies succeeded). For matrix jobs without an
  # umbrella, every leg's rendered context must be listed.
  #
  # === Phase-2a-era frozen set (ci-decisions-2026-04-22.md §4) ===
  #
  #   ci.yml:
  #     - "cross-leg byte-equality gate (T9)"  (needs: build-and-test, wasm-runtime)
  #     - "create-benten-app cold install"     (needs: build-and-test; cold-install job)
  #     - "release-build (--no-default-features) gate"
  #
  #   determinism.yml:
  #     - "T9 cross-leg byte-equality gate"    (needs: multi-arch, msrv, wasm-runtime)
  #
  #   phase-2a-exit-criteria.yml:
  #     - "Phase 2a exit-gate aggregate"       (needs: all 4 gate jobs)
  #
  #   drift-detect.yml:
  #     - "docs ↔ Rust enum ↔ TS types parity"
  #     - "self-test (meta-assertion that the detector actually detects)"
  #
  #   supply-chain.yml:
  #     - "cargo-deny (licenses / bans / advisories / sources)"
  #     - "cargo-audit (belt-and-suspenders)"
  #     - "Cargo.lock integrity"
  #     (NOT requiring `weekly-audit-issue` — schedule-only, never runs on PR.)
  #
  # === Phase-2b/3 additions (added in pre-v1 cleanup) ===
  #
  # Pre-v1 CI-coverage doc-review lens flagged the spec as frozen at
  # Phase-2a §4. The gates below became load-bearing during Phase 2b
  # (SANDBOX + WASM compute) and Phase 3 (P2P sync + thin-client posture)
  # but were never promoted to required-status. All are always-run on
  # PRs (no path filters) so requiring them does not block doc-only PRs.
  #
  #   bundle-size.yml:
  #     - "browser bundle size — RED-PHASE STUB"
  #       Enforces CLAUDE.md baked-in #17 thin-client posture
  #       (≤600KB gzipped browser bundle cap; rung 3 of 3-rung defense).
  #
  #   cross-process-graph.yml:
  #     - "benten-graph cross-process CID roundtrip"
  #       Cross-process determinism — a load-bearing Phase-1 invariant
  #       still active through Phase 3 sync; was previously listed as
  #       informational pending path-conditional-required, but always-runs.
  #
  #   cross-browser-determinism.yml:
  #     - "determinism / chromium"
  #     - "determinism / firefox"
  #     - "determinism / webkit"
  #     - "cid_pin equivalence across three browsers (compare reduce)"
  #       Phase-3 thin-client posture — same canonical CID across all
  #       three major browser engines + reduce-stage equivalence.
  #
  #   wasm-conformance.yml:
  #     - "SANDBOX adversarial fixture suite — wasm32-wasip1"
  #       Phase-2b SANDBOX runtime adversarial conformance.
  #
  #   wasm-browser.yml:
  #     - "bundle + size cap + headless smoke"
  #       Phase-3 thin-client posture (CLAUDE.md baked-in #17 rung 3
  #       sibling — bundle build + size cap + smoke verification).
  #
  #   wasm-checks.yml:
  #     - "T8 benten-napi wasm32-unknown-unknown"
  #     - "benten-sync refuses to compile for wasm32-unknown-unknown"
  #       The latter is the 3-rung baked-in #17 defense rung 1
  #       (compile-time refusal of sync code in browser bundle).
  #
  #   wasm-runtime.yml:
  #     - "wasm32-wasip1 build (benten-core, benten-graph)"
  #     - "canonical CID — native vs wasm32-wasip1 invariant"
  #     - "wasm32-wasip1 smoke — benten-core test under wasmtime"
  #       Multi-target invariant proof (canonical bytes preserved across
  #       native / wasm32-wasip1) + wasmtime runtime smoke.
  #
  #   multi-arch-cargo-check.yml:
  #     - "cargo check (linux-x86_64)"
  #     - "cargo check (linux-arm64)"
  #     - "cargo check (macos-arm64)"
  #     - "cargo check (macos-x86_64)"
  #     - "AArch64 SANDBOX runtime (macos-14 / Apple M1)"
  #       Phase-2b multi-platform support gates (T4 architecture
  #       diversity + AArch64 SANDBOX runtime cell).
  #
  # === Excluded (and why) ===
  #
  # CodeQL (`codeql.yml`) is NOT required per ci-decisions-2026-04-22.md §4
  # — informational only via Code-scanning alerts.
  #
  # Path-filtered workflows (`arch-1-dep-break.yml`,
  # `inv-11-system-zone-drift.yml`, `host-error-wire-safety.yml`,
  # `bench-threshold-drift.yml`) are NOT required — making them required
  # would block doc-only PRs (paths gate prevents the workflow from
  # running at all on those PRs, and GitHub treats absent-required as
  # blocking). Pending path-conditional-required support in GitHub
  # Rulesets API.
  #
  # Schedule-only workflows (`fuzz.yml`, `mutants.yml`,
  # `supply-chain-seeded-test.yml`, `weekly-audit-issue` job in
  # supply-chain.yml) are NOT required — they never run on PR.
  required_status_checks:
    strict: true   # branches must be up-to-date before merging
    contexts:
      # === Phase-2a-era frozen set ===
      # ci.yml
      - "cross-leg byte-equality gate (T9)"
      - "create-benten-app cold install"
      - "release-build (--no-default-features) gate"
      # determinism.yml
      - "T9 cross-leg byte-equality gate"
      # phase-2a-exit-criteria.yml
      - "Phase 2a exit-gate aggregate"
      # drift-detect.yml
      - "docs ↔ Rust enum ↔ TS types parity"
      - "self-test (meta-assertion that the detector actually detects)"
      # supply-chain.yml
      - "cargo-deny (licenses / bans / advisories / sources)"
      - "cargo-audit (belt-and-suspenders)"
      - "Cargo.lock integrity"
      # === Phase-2b/3 additions ===
      # bundle-size.yml
      - "browser bundle size — RED-PHASE STUB"
      # cross-process-graph.yml
      - "benten-graph cross-process CID roundtrip"
      # cross-browser-determinism.yml
      - "determinism / chromium"
      - "determinism / firefox"
      - "determinism / webkit"
      - "cid_pin equivalence across three browsers (compare reduce)"
      # wasm-conformance.yml
      - "SANDBOX adversarial fixture suite — wasm32-wasip1"
      # wasm-browser.yml
      - "bundle + size cap + headless smoke"
      # wasm-checks.yml
      - "T8 benten-napi wasm32-unknown-unknown"
      - "benten-sync refuses to compile for wasm32-unknown-unknown"
      # wasm-runtime.yml
      - "wasm32-wasip1 build (benten-core, benten-graph)"
      - "canonical CID — native vs wasm32-wasip1 invariant"
      - "wasm32-wasip1 smoke — benten-core test under wasmtime"
      # multi-arch-cargo-check.yml
      - "cargo check (linux-x86_64)"
      - "cargo check (linux-arm64)"
      - "cargo check (macos-arm64)"
      - "cargo check (macos-x86_64)"
      - "AArch64 SANDBOX runtime (macos-14 / Apple M1)"

  # ---- Pull-request review requirements ----
  #
  # 0 reviewers — solo project. Review discipline lives in the Pattern-6
  # ADDL agent dispatches, not in PR review counts. Ben can flip this to
  # ≥1 once a second human committer is added.
  required_pull_request_reviews:
    required_approving_review_count: 0
    dismiss_stale_reviews: true
    require_code_owner_reviews: false
    require_last_push_approval: false

  # ---- Conversation resolution ----
  required_conversation_resolution: true

  # ---- Linear history ----
  #
  # No merge commits — Ben's commit conventions (CLAUDE.md "Commit
  # Conventions") prefer fast-forward / rebase only.
  required_linear_history: true

  # ---- Force-push / deletion bans ----
  #
  # CLAUDE.md "no force-push to main" is non-negotiable. Encoded here so
  # the rule applies even if a future PAT bypasses local discipline.
  allow_force_pushes: false
  allow_deletions: false

  # ---- Admin enforcement ----
  #
  # The rule applies to Ben (admin) too. Without `enforce_admins: true`
  # an admin push could bypass all the above; with it on, even Ben must
  # open a PR + wait for all required status checks (Phase-2a frozen
  # set + Phase-2b/3 additions enumerated above).
  enforce_admins: true

  # ---- Signed commits ----
  #
  # Phase-2a does not require GPG signing (no signing infra in place
  # yet). Phase 3+ peer-mesh sync may revisit this when ed25519-dalek
  # peer identity lands. Explicit `false` documents the current choice.
  required_signatures: false

  # ---- Lock branch / fork-syncing ----
  #
  # Branch is not locked (active development); fork-syncing not
  # applicable (no public forks).
  lock_branch: false
  allow_fork_syncing: false

  # ---- Block creations ----
  #
  # `restrictions: null` means anyone with push access can push to
  # branches matching the protection rule. For `main` push access is
  # gated by the above (force-push / deletion / linear-history rules);
  # no push-actor restriction beyond repo permissions.
  restrictions: null

  # ---- Bypass actors ----
  #
  # No bypass list — combined with `enforce_admins: true`, no one can
  # skip required checks. Phase-3+ may add a release-bot bypass if
  # release-plz lands.
  block_creations: false
